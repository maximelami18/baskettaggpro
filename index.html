<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Basket Tagg Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#1A1A1A;--bg2:#222222;--surf:#2A2A2A;--surf2:#323232;--surf3:#3A3A3A;
  --bdr:rgba(212,170,106,0.10);--bdr2:rgba(212,170,106,0.20);--bdrw:rgba(255,255,255,0.08);
  --txt:#F0E8D8;--txt2:#A89880;--txt3:#6A5E50;
  --acc:#D4AA6A;--acc2:#B8904A;--acc3:#E8C88A;--acc-d:rgba(212,170,106,0.12);--acc-g:rgba(212,170,106,0.22);--acc-b:rgba(212,170,106,0.06);
  --grn:#3DC97A;--grn-d:rgba(61,201,122,0.12);
  --red:#E05252;--red-d:rgba(224,82,82,0.12);
  --blu:#5B8DEF;--blu-d:rgba(91,141,239,0.10);
  --r:11px;--rsm:8px;--rlg:18px;--rxl:24px;
  --sh:0 2px 12px rgba(0,0,0,0.4),0 0 0 1px var(--bdr);
  --shlg:0 12px 40px rgba(0,0,0,0.6),0 0 0 1px var(--bdr2);
  --shgold:0 4px 20px rgba(212,170,106,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;font-size:15px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px;}
input::placeholder{color:var(--txt3);}
select option{background:var(--surf);color:var(--txt);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:var(--rsm);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;padding:0 15px;height:38px;font-family:inherit;}
.btn:active{transform:scale(0.97);}
.bp{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#150E00;box-shadow:var(--shgold);}.bp:hover{background:linear-gradient(135deg,var(--acc3),var(--acc));}
.bg{background:var(--surf2);color:var(--txt2);border:1px solid var(--bdr2);}.bg:hover{background:var(--surf3);color:var(--txt);}
.bd{background:var(--red-d);color:var(--red);border:1px solid rgba(224,82,82,0.2);}
.bsm{height:30px;font-size:12px;padding:0 10px;border-radius:7px;}

/* ── INPUTS ── */
.inp{height:40px;padding:0 13px;border-radius:var(--rsm);border:1px solid var(--bdr2);background:var(--bg2);color:var(--txt);font-size:15px;outline:none;width:100%;font-family:inherit;transition:border-color 0.15s;}
.inp:focus{border-color:var(--acc);}
.sel{height:40px;padding:0 13px;border-radius:var(--rsm);border:1px solid var(--bdr2);background:var(--bg2);color:var(--txt);font-size:15px;outline:none;width:100%;cursor:pointer;font-family:inherit;}

/* ── CARD ── */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rlg);box-shadow:var(--sh);}
.card-gold{background:linear-gradient(135deg,rgba(212,170,106,0.06),var(--surf));border:1px solid var(--bdr2);}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}

/* ── NAV ── */
.navBtn{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:var(--rsm);border:1px solid transparent;background:transparent;color:var(--txt3);cursor:pointer;font-size:15px;font-weight:500;width:100%;text-align:left;font-family:inherit;transition:all 0.15s;}
.navBtn:hover{background:var(--surf);color:var(--txt2);}
.navBtn.active{background:var(--acc-d);border-color:var(--bdr2);color:var(--acc);}

/* ── LAYOUT ── */
#mainView{position:fixed;inset:0;display:none;flex-direction:column;}
#topbar{background:var(--surf);border-bottom:1px solid var(--bdr2);padding:0 24px;height:56px;display:flex;align-items:center;gap:15px;flex-shrink:0;}
#mainContent{flex:1;min-height:0;display:flex;overflow:hidden;}
#sidebar{width:228px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bdr);padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
#pageArea{flex:1;min-width:0;overflow-y:auto;padding:26px;background:var(--bg);}

/* ── CODING ── */
#codingView{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);}
#codingView.active{display:flex;}
#codingHeader{background:var(--surf);border-bottom:1px solid var(--bdr2);padding:0 13px;height:48px;display:flex;align-items:center;gap:9px;flex-shrink:0;overflow-x:auto;}
#codingBody{flex:1;min-height:0;display:flex;overflow:hidden;}

/* Seq panel (resizable) */
#seqPanel{background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;width:260px;min-width:140px;}

/* Right col */
#rightCol{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
#mediaRow{display:flex;flex-direction:row;flex-shrink:0;height:240px;overflow:hidden;}
#courtCol{background:#0A1828;border-right:1px solid var(--bdr);display:none;flex-direction:column;overflow:hidden;flex-shrink:0;width:300px;min-width:200px;}
#videoWrap{flex:1;background:#07080D;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;min-width:200px;}
#mainVideo{width:100%;height:100%;object-fit:contain;}
#videoPlaceholder{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:9px;width:100%;height:100%;}
#licenceScreen{position:fixed;inset:0;background:#0D0D0D;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:'Outfit',sans-serif;}
#licenceBox{background:#1A1A1A;border:1px solid rgba(212,170,106,0.3);border-radius:20px;padding:48px 44px;max-width:440px;width:90%;text-align:center;}
#licenceBox h1{font-size:26px;font-weight:800;color:#D4AA6A;margin:0 0 6px;}
#licenceBox p{color:#888;font-size:14px;margin:0 0 28px;line-height:1.6;}
#licenceInput{width:100%;box-sizing:border-box;background:#111;border:1.5px solid rgba(212,170,106,0.25);border-radius:10px;padding:14px 16px;color:#fff;font-size:16px;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;text-align:center;outline:none;transition:border-color 0.2s;}
#licenceInput:focus{border-color:rgba(212,170,106,0.7);}
#licenceInput::placeholder{color:#444;letter-spacing:0;}
#licenceBtn{margin-top:14px;width:100%;padding:14px;background:#D4AA6A;border:none;border-radius:10px;color:#111;font-size:15px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity 0.2s;}
#licenceBtn:hover{opacity:0.88;}
#licenceBtn:disabled{opacity:0.4;cursor:not-allowed;}
#licenceMsg{margin-top:12px;font-size:13px;min-height:20px;}
#licenceMsg.ok{color:#3DC97A;}
#licenceMsg.err{color:#E05252;}
.btp-logo-txt{font-size:13px;color:#444;margin-top:24px;}
#videoControls{background:#08090F;padding:6px 13px;flex-shrink:0;border-top:1px solid var(--bdr);}
#progBar{height:3px;background:rgba(255,255,255,0.09);border-radius:3px;cursor:pointer;margin-bottom:6px;}
#progFill{height:3px;background:var(--acc);border-radius:3px;width:0%;transition:none;}
#videoCtrlRow{display:flex;align-items:center;gap:5px;}
#bottomRow{flex:1;min-height:0;display:flex;overflow:hidden;}
#actionPanel{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--surf);}

/* Indiv players panel (resizable) */
#indivPlayersPanel{display:none !important;}

/* Resize handles */
.rv{width:5px;cursor:ew-resize;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--bdr);}
.rv::after{content:'';width:1px;height:22px;background:var(--bdr2);border-radius:1px;}
.rh{height:5px;cursor:ns-resize;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;border-top:1px solid var(--bdr);}
.rh::after{content:'';height:1px;width:22px;background:var(--bdr2);border-radius:1px;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,6,10,0.80);backdrop-filter:blur(6px);z-index:800;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--rxl);padding:26px;width:600px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shlg);}
.modal-full{width:96vw;height:92vh;max-width:none;max-height:none;display:flex;flex-direction:column;}

/* Video ctrl */
.vcb{background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.55);border-radius:5px;padding:0 8px;height:25px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.12s;}
.vcb:hover{background:rgba(255,255,255,0.13);}
.vcb.act{background:var(--acc);color:#150E00;}

/* Action tags */
.atag{display:inline-flex;align-items:center;padding:9px 17px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all 0.15s;font-family:inherit;}

/* Player cell */
.pcell{border-radius:10px;border:1px solid var(--bdr);background:var(--surf);padding:10px;cursor:pointer;transition:all 0.15s;text-align:center;}
.pcell:hover{border-color:var(--acc);background:var(--acc-d);}
.pcell.sel{border-color:var(--acc);background:var(--acc-d);}

/* Stat cols */
.stat-grid{display:grid;gap:10px;padding:12px;flex:1;overflow-y:auto;}
@keyframes liveBlink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.stat-col{display:flex;flex-direction:column;gap:6px;}
.sc-title{font-size:11px;color:var(--acc);font-weight:700;text-transform:uppercase;letter-spacing:0.11em;padding-bottom:6px;border-bottom:1px solid var(--bdr2);margin-bottom:4px;}
.sb{width:100%;padding:10px 6px;border-radius:9px;border:1px solid var(--bdr2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;background:var(--surf2);color:var(--txt2);transition:all 0.12s;}
.sb:hover{filter:brightness(1.12);}
.sb.grn{background:var(--grn-d);color:var(--grn);border-color:rgba(61,201,122,0.25);}
.sb.red{background:var(--red-d);color:var(--red);border-color:rgba(224,82,82,0.25);}
.sb:disabled{opacity:0.3;cursor:not-allowed;filter:none;}
</style>
</head>

function formatLicenceKey(inp){
  var v=inp.value.replace(/[^A-Z0-9a-z]/g,'').toUpperCase();
  var parts=[];
  if(v.length>0)parts.push(v.substr(0,3));

      btn.disabled=false;btn.textContent='Vérifier la licence';return;
    }
    var now=new Date();var exp=new Date(lic.expires_at);
    if(exp<now){
      setLicenceMsg('❌ Licence expirée le '+exp.toLocaleDateString('fr-FR')+'.','err');
      btn.disabled=false;btn.textContent='Vérifier la licence';return;
    }
    // Vérifier ou enregistrer le machine_id
    if(lic.machine_id&&lic.machine_id!==machineId){
      setLicenceMsg('❌ Cette licence est liée à un autre appareil. Contactez le support.','err');
      btn.disabled=false;btn.textContent='Vérifier la licence';return;
    }
    // Enregistrer le machine_id si pas encore fait
    if(!lic.machine_id||lic.machine_id===''){
      var patchRes=await fetch(_SB_URL+'/rest/v1/licences?key=eq.'+encodeURIComponent(key),{
        method:'PATCH',
        headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify({machine_id:machineId})
      });
      console.log('PATCH machine_id status:',patchRes.status);
    }
    // ✅ Licence valide
    var daysLeft=Math.ceil((exp-now)/(1000*60*60*24));
    setLicenceMsg('✓ Licence valide — expire dans '+daysLeft+' jour'+(daysLeft>1?'s':''),'ok');
    localStorage.setItem(_LICENCE_KEY,JSON.stringify({key:key,expires:lic.expires_at,checked:Date.now()}));
    setTimeout(function(){
      document.getElementById('licenceScreen').style.display='none';
      initApp();
    },800);
  }catch(e){
    // Si pas de connexion, vérifier le cache local (1h de grâce)
    var cached=localStorage.getItem(_LICENCE_KEY);
    if(cached){
      try{
        var ld=JSON.parse(cached);
        var age=(Date.now()-ld.checked)/(1000*60*60);
        var exp2=new Date(ld.expires);
        if(age<1&&exp2>new Date()){
          setLicenceMsg('✓ Mode hors-ligne (vérifié il y a '+Math.round(age*60)+' min)','ok');
          setTimeout(function(){
            document.getElementById('licenceScreen').style.display='none';
            initApp();
          },600);
          return;
        }
      }catch(e2){}
    }
    setLicenceMsg('❌ Impossible de contacter le serveur. Vérifiez votre connexion.','err');
    btn.disabled=false;btn.textContent='Vérifier la licence';
  }
}

// Vérifier si une licence valide est déjà en cache

}

async function silentRecheck(key){
  try{
    var url=_SB_URL+'/rest/v1/licences?key=eq.'+encodeURIComponent(key)+'&select=active,expires_at';
    var res=await fetch(url,{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY}});
    var data=await res.json();
    if(data&&data.length&&data[0].active&&new Date(data[0].expires_at)>new Date()){
      var cached=JSON.parse(localStorage.getItem(_LICENCE_KEY)||'{}');
      cached.checked=Date.now();
      localStorage.setItem(_LICENCE_KEY,JSON.stringify(cached));
    } else {
      localStorage.removeItem(_LICENCE_KEY);

  }catch(e){}
}

async function silentRecheckOnStart(key){
  // Vérifie en ligne AVANT d'ouvrir l'app
  try{
    var url=_SB_URL+'/rest/v1/licences?key=eq.'+encodeURIComponent(key)+'&select=active,expires_at,machine_id';
    var res=await fetch(url,{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY}});

        document.getElementById('licenceMsg').className='err';

      var machineId=getMachineId();
      if(!data[0].machine_id||data[0].machine_id===''){
        await fetch(_SB_URL+'/rest/v1/licences?key=eq.'+encodeURIComponent(key),{
          method:'PATCH',
          headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({machine_id:machineId})

      var cached=JSON.parse(localStorage.getItem(_LICENCE_KEY)||'{}');

      localStorage.setItem(_LICENCE_KEY,JSON.stringify(cached));
      document.getElementById('licenceScreen').style.display='none';

      localStorage.removeItem(_LICENCE_KEY);

      document.getElementById('licenceMsg').textContent='❌ Licence révoquée ou expirée.';
      document.getElementById('licenceMsg').className='err';
    }
  }catch(e){
    // Pas de connexion — 1h de grâce hors-ligne
    var cached=localStorage.getItem(_LICENCE_KEY);
    if(cached){
      var ld=JSON.parse(cached);
      var age=(Date.now()-ld.checked)/(1000*60*60);

// ── Stockage vidéo complet dans IndexedDB (jusqu'à plusieurs Go) ──
var _videoDB=null;
function openVideoDB(cb){
  if(_videoDB){cb(_videoDB);return;}
  var req=indexedDB.open('btp_videos',2);
  req.onupgradeneeded=function(e){
    var db=e.target.result;
    if(!db.objectStoreNames.contains('blobs'))db.createObjectStore('blobs',{keyPath:'matchId'});
  };
  req.onsuccess=function(e){_videoDB=e.target.result;cb(_videoDB);};
  req.onerror=function(){cb(null);};
}

function saveVideoBlob(matchId,file,onProgress){
  openVideoDB(function(db){
    if(!db){onProgress&&onProgress(-1);return;}
    // Stockage direct du Blob — pas de FileReader, pas de chargement en RAM.
    // Indispensable pour les fichiers de 3-4 Go (readAsArrayBuffer ferait planter le navigateur).
    onProgress&&onProgress(1);
    try{
      var tx=db.transaction('blobs','readwrite');
      var req=tx.objectStore('blobs').put({matchId:matchId,blob:file,name:file.name,type:file.type});
      req.onsuccess=function(){onProgress&&onProgress(90);};
      tx.oncomplete=function(){onProgress&&onProgress(100);};
      tx.onerror=function(ev){console.error('IDB tx error',ev);onProgress&&onProgress(-1);};
      tx.onabort=function(ev){console.error('IDB tx aborted',ev);onProgress&&onProgress(-1);};
    }catch(err){
      console.error('saveVideoBlob error',err);
      onProgress&&onProgress(-1);
    }
  });
}

function autoRestoreVideo(matchId){
  var m=gM(matchId);
  var pn=document.getElementById('vidPlaceholderName');

  // ── Live mode: charger le player API ──
  if(m&&m.liveMode&&m.liveUrl){
    loadLivePlayer(m.liveUrl);
    return;
  }

  var videos=m&&m.videos&&m.videos.length?m.videos:null;

  if(videos&&videos.length>0){
    // Multi-video : restaurer chaque vidéo depuis IndexedDB
    var loaded=[];
    var toLoad=videos.length;
    videos.forEach(function(v,vi){
      loadVideoBlob(matchId+'_'+vi,function(entry){
        if(entry){
          var url=URL.createObjectURL(entry.blob);
          loaded[vi]={label:v.label,name:entry.name,url:url};
          // Mettre à jour l'URL en mémoire
          m.videos[vi].url=url;
        } else if(v.url){
          loaded[vi]={label:v.label,name:v.name,url:v.url};
        } else {
          loaded[vi]=null;
        }
        toLoad--;
        if(toLoad===0){
          // Tout chargé — afficher la première vidéo disponible
          var first=loaded.find(function(x){return x;});
          if(first){
            _currentVideoIdx=loaded.indexOf(first);
            switchToVideo(loaded,_currentVideoIdx);
            renderVideoSelectorBar(loaded,matchId);
            toast('✓ '+loaded.filter(Boolean).length+' vidéo(s) chargée(s)','acc');
          }
        }
      });
    });
  } else {
    // Compat ancienne vidéo unique
    if(m&&m.videoFile&&pn)pn.textContent='📹 '+m.videoFile;
    loadVideoBlob(matchId,function(entry){
      if(!entry)return;
      var url=URL.createObjectURL(entry.blob);
      if(m){m.videoURL=url;m.videoFile=entry.name;}
      var v2=document.getElementById('mainVideo');
      var ph=document.getElementById('videoPlaceholder');
      if(v2&&ph){v2.src=url;v2.style.display='block';ph.style.display='none';}
      renderVideoSelectorBar(null,matchId);
      toast('✓ Vidéo chargée : '+entry.name,'acc');
    });
  }
}

// ════════════════════════════════════
// LIVE PLAYER — YouTube / Dailymotion / Twitch APIs
// ════════════════════════════════════
var _livePlayer = null;      // instance du player actif
var _livePlatform = null;    // 'youtube' | 'dailymotion' | 'twitch'
var _liveReady = false;      // player prêt à répondre aux appels API
var _liveProgressInterval = null;

// ── Détection de plateforme et extraction d'ID ──
function detectLive(url) {
  var ytM = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/live\/)([A-Za-z0-9_-]{11})/);
  if (ytM) return { platform: 'youtube', id: ytM[1] };
  var dmM = url.match(/dailymotion\.com\/video\/([A-Za-z0-9]+)/);
  if (dmM) return { platform: 'dailymotion', id: dmM[1] };
  var dmE = url.match(/dailymotion\.com\/embed\/video\/([A-Za-z0-9]+)/);
  if (dmE) return { platform: 'dailymotion', id: dmE[1] };
  var twC = url.match(/twitch\.tv\/([A-Za-z0-9_]+)$/);
  if (twC) return { platform: 'twitch', id: twC[1], type: 'channel' };
  var twV = url.match(/twitch\.tv\/videos\/(\d+)/);
  if (twV) return { platform: 'twitch', id: twV[1], type: 'video' };
  return null;
}

// Alias pour compatibilité avec le formulaire
function parseLiveUrl(url) {
  var d = detectLive(url);
  return d ? true : null;
}

// ── Unified player API ──
function liveGetCurrentTime() {
  if (!_liveReady || !_livePlayer) return 0;
  try {
    if (_livePlatform === 'youtube') return _livePlayer.getCurrentTime() || 0;
    if (_livePlatform === 'dailymotion') return _livePlayer.currentTime || 0;
    if (_livePlatform === 'twitch') return _livePlayer.getCurrentTime() || 0;
  } catch(e) {}
  return 0;
}
function livePausePlayer() {
  if (!_liveReady || !_livePlayer) return;
  try {
    if (_livePlatform === 'youtube') _livePlayer.pauseVideo();
    if (_livePlatform === 'dailymotion') _livePlayer.pause();
    if (_livePlatform === 'twitch') _livePlayer.pause();
  } catch(e) {}
}
function livePlayPlayer() {
  if (!_liveReady || !_livePlayer) return;
  try {
    if (_livePlatform === 'youtube') _livePlayer.playVideo();
    if (_livePlatform === 'dailymotion') _livePlayer.play();
    if (_livePlatform === 'twitch') _livePlayer.play();
  } catch(e) {}
}
function liveSeekPlayer(sec) {
  if (!_liveReady || !_livePlayer) return;
  try {
    if (_livePlatform === 'youtube') _livePlayer.seekTo(Math.max(0, sec), true);
    if (_livePlatform === 'dailymotion') _livePlayer.seek(Math.max(0, sec));
    if (_livePlatform === 'twitch') _livePlayer.seek(Math.max(0, sec));
  } catch(e) {}
}
function liveIsPlaying() {
  if (!_liveReady || !_livePlayer) return false;
  try {
    if (_livePlatform === 'youtube') return _livePlayer.getPlayerState() === 1; // YT.PlayerState.PLAYING
    if (_livePlatform === 'dailymotion') return !_livePlayer.paused;
    if (_livePlatform === 'twitch') return !_livePlayer.isPaused();
  } catch(e) {}
  return false;
}

// ── Progress bar update loop ──
function _startLiveProgressLoop() {
  clearInterval(_liveProgressInterval);
  _liveProgressInterval = setInterval(function() {
    if (!_liveReady) return;
    var t = liveGetCurrentTime();
    var d = 0;
    try {
      if (_livePlatform === 'youtube') d = _livePlayer.getDuration() || 0;
      if (_livePlatform === 'dailymotion') d = _livePlayer.duration || 0;
      if (_livePlatform === 'twitch') d = _livePlayer.getDuration() || 0;
    } catch(e) {}
    var pct = d > 0 ? (t / d * 100) : 0;
    var fill = document.getElementById('progFill');
    var label = document.getElementById('timeLabel');
    var statusLabel = document.getElementById('liveStatusLabel');
    if (fill) fill.style.width = pct + '%';
    if (label) label.textContent = fmtTime(t);
    if (statusLabel) {
      var playing = liveIsPlaying();
      statusLabel.textContent = playing ? '🔴 LIVE' : '⏸ PAUSE';
      statusLabel.style.color = playing ? '#E05252' : '#D4AA6A';
    }
    // Sync play button
    var pb = document.getElementById('playBtn');
    if (pb) {
      if (liveIsPlaying()) { pb.textContent = '⏸'; pb.classList.remove('act'); }
      else { pb.textContent = '▶'; pb.classList.add('act'); }
    }
  }, 300);
}

var DB;
function initDB(){
  var s=localStorage.getItem('btp_db_local');
  if(s){try{DB=JSON.parse(s);if(!DB.nextId)DB.nextId=500;
    // Purge sequences whose match no longer exists

    DB.sequences=DB.sequences.filter(function(seq){return matchIds.indexOf(seq.matchId)>=0;});

  DB={teams:[],matches:[],

}

// ── Image compression — reduces photos to max 200px, quality 0.7 ──
function compressImage(dataUrl, maxSize, quality, callback){
  if(!dataUrl){callback(null);return;}
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height;
    var scale=Math.min(1,maxSize/Math.max(w,h));
    var cw=Math.round(w*scale),ch=Math.round(h*scale);
    var cv=document.createElement('canvas');
    cv.width=cw;cv.height=ch;
    var ctx=cv.getContext('2d');
    ctx.drawImage(img,0,0,cw,ch);
    callback(cv.toDataURL('image/jpeg',quality));
  };
  img.onerror=function(){callback(dataUrl);};
  img.src=dataUrl;
}

function saveDB(){
  if(!DB)return;
  try{
    localStorage.setItem('btp_db_local',JSON.stringify(DB));
  }catch(e){
    if(e.name==='QuotaExceededError'){
      // Try removing old shot data to free space, then retry
      toast('⚠️ Stockage presque plein — compressez vos photos','red');
      console.warn('localStorage quota exceeded',e);
    }
  }
}
function getLog(matchId){if(!DB.statLogs)DB.statLogs={};if(!DB.statLogs[matchId])DB.statLogs[matchId]=[];return DB.statLogs[matchId];}

function nid(){return++DB.nextId;}

// Stats: eval = pts + reb + pd + inter + contre - tirs_manqués - lf_manqués - bp
// tirs manqués = (2PT_tentés + 3PT_tentés) - (2PM + 3PM) = pts2r + pts3r
// LF manqués = lfr (les LF loupés enregistrés)
// = pts + (rebo+rebd) + pd + inter + contre - pts2r - pts3r - lfr - bp
function gPS(mid,pid){var k=mid+'_'+pid;if(!DB.pStats[k])DB.pStats[k]={pts2m:0,pts2r:0,pts3m:0,pts3r:0,lfm:0,lfr:0,rebo:0,rebd:0,pd:0,inter:0,contre:0,bp:0,fi:0,fc:0,pts:0,pm:0,eval:0,min:0,shots:[]};return DB.pStats[k];}
function recalc(mid,pid){
  var s=gPS(mid,pid);
  s.pts=s.pts2m*2+s.pts3m*3+s.lfm;
  var reb=(s.rebo||0)+(s.rebd||0);
  // Eval = pts + reb_tot + pd + inter + contre - pts2r - pts3r - lfr - bp
  s.eval=s.pts+reb+(s.pd||0)+(s.inter||0)+(s.contre||0)-(s.pts2r||0)-(s.pts3r||0)-(s.lfr||0)-(s.bp||0);
  saveDB();
}
// +/- tracking: when on court, track pts diff
function updatePM(scored, isTeam){
  // For each player on court, update their +/-
  var m=curMatch();if(!m)return;
  CS.onCourt.forEach(function(pid){
    var s=gPS(CS.matchId,pid);
    s.pm=(s.pm||0)+(isTeam?scored:-scored);
    recalc(CS.matchId,pid);
  });
}

function showPlayerStatsModal(tid,pid){
  var team=gT(tid),p=team&&team.players.find(function(x){return x.id===pid;});if(!p)return;
  var totPts=0,totReb=0,totPd=0,totEval=0,totPm=0,tot2m=0,tot2r=0,tot3m=0,tot3r=0,totLFm=0,totLFr=0,mCount=0;
  DB.matches.forEach(function(m){var s=DB.pStats[m.id+'_'+pid];if(!s)return;mCount++;totPts+=(s.pts||0);totReb+=(s.rebo||0)+(s.rebd||0);totPd+=(s.pd||0);totEval+=(s.eval||0);totPm+=(s.pm||0);tot2m+=(s.pts2m||0);tot2r+=(s.pts2r||0);tot3m+=(s.pts3m||0);tot3r+=(s.pts3r||0);totLFm+=(s.lfm||0);totLFr+=(s.lfr||0);});
  var mc=mCount||1;
  var pct2=tot2m+tot2r>0?Math.round(tot2m/(tot2m+tot2r)*100)+'%':'—';
  var pct3=tot3m+tot3r>0?Math.round(tot3m/(tot3m+tot3r)*100)+'%':'—';
  var pctLF=totLFm+totLFr>0?Math.round(totLFm/(totLFm+totLFr)*100)+'%':'—';
  var totMin=0;
  DB.matches.forEach(function(m){var s=DB.pStats[m.id+'_'+pid];if(s)totMin+=(s.min||0);});
  var avgMin=mCount>0?(totMin/mCount).toFixed(1):'—';
  var stats=[['Pts total',totPts],['Moy. pts',(totPts/mc).toFixed(1)],['Moy. reb.',(totReb/mc).toFixed(1)],['Moy. pd.',(totPd/mc).toFixed(1)],['% 2pts',pct2],['% 3pts',pct3],['% LF',pctLF],['Matchs',mCount],['Moy. +/-',(totPm/mc).toFixed(1)],['Moy. éval.',(totEval/mc).toFixed(1)]];
  var h='<div class="modal-bg" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()">'
    +'<div style="display:flex;align-items:center;gap:15px;margin-bottom:20px;background:var(--acc-d);border-radius:var(--r);padding:18px;">'
    +'<div style="width:64px;height:64px;border-radius:16px;background:'+(p.photo?'url('+p.photo+') center/cover':'linear-gradient(135deg,var(--acc-d),var(--bg2))')+';display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;flex-shrink:0;border:1px solid var(--bdr2);">'+(p.photo?'':'👤')+'</div>'
    +'<div><div style="font-size:21px;font-weight:800;color:var(--txt);letter-spacing:-0.02em;">'+p.first+' '+p.last+'</div>'
    +'<div style="font-size:14px;color:var(--txt2);margin-top:3px;">#'+p.num+' · '+p.pos+' · '+team.name+'</div>'
    +'<div style="margin-top:10px;display:flex;gap:7px;flex-wrap:wrap;">'+badge(team.champ,'acc')+badge(mCount+' match'+(mCount>1?'s':''),'def')+(totMin>0?'<span style="font-size:13px;color:var(--acc);font-weight:600;background:var(--acc-d);padding:3px 10px;border-radius:20px;border:1px solid var(--bdr2);">⏱ Moy. '+avgMin+' min</span>':'')+'</div></div>'
    +'<button onclick="closeModal()" style="margin-left:auto;background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;">✕</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:9px;">';
  stats.forEach(function(s){h+='<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:13px 14px;"><div style="font-size:11px;color:var(--acc);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px;">'+s[0]+'</div><div style="font-size:19px;font-weight:800;color:var(--txt);">'+s[1]+'</div></div>';});
  h+='</div></div></div>';
  document.getElementById('modalContainer').innerHTML=h;
}

function toggleTeamExpand(id){_expT=(_expT===id?null:id);renderPage();}

function deleteTeam(id){
  if(!confirm('Supprimer cette équipe et tous ses joueurs ?'))return;
  DB.teams=DB.teams.filter(function(t){return t.id!==id;});
  if(_expT===id)_expT=null;
  saveDB();renderPage();
}

function deletePlayer(tid,pid){
  var t=gT(tid);
  if(t)t.players=t.players.filter(function(p){return p.id!==pid;});
  saveDB();renderPage();
}

function _onTeamLogoChange(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    compressImage(e.target.result,300,0.8,function(compressed){
      if(window._TF)window._TF.logo=compressed;
      var el=document.getElementById('tm_logo_prev');
      if(el&&compressed)el.innerHTML='<img src="'+compressed+'" style="width:100%;height:100%;object-fit:cover;"/>';
    });
  };
  r.readAsDataURL(f);
}

function saveTeamModal(){
  var tf=window._TF;if(!tf)return;
  var name=(tf.name||'').trim();
  if(!name){toast('Le nom est obligatoire','red');return;}
  if(tf.tid){
    var t=gT(tf.tid);if(!t)return;
    t.name=name;t.champ=(tf.champ||'').trim();t.season=(tf.season||'').trim();
    if(tf.logo)t.logo=tf.logo;
  } else {
    DB.teams.push({id:nid(),name:name,champ:(tf.champ||'').trim(),season:(tf.season||'').trim(),logo:tf.logo||null,wins:0,losses:0,mCount:0,ptsFor:0,ptsAgainst:0,players:[]});
  }
  window._TF=null;
  saveDB();
  document.getElementById('modalContainer').innerHTML='';
  renderPage();
  toast('✓ Équipe enregistrée','acc');
}

function _onPlayerPhotoChange(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    compressImage(e.target.result,300,0.75,function(compressed){
      if(window._PF)window._PF.photo=compressed;
      var el=document.getElementById('pl_photo_prev');
      if(el&&compressed)el.innerHTML='<img src="'+compressed+'" style="width:100%;height:100%;object-fit:cover;"/>';
    });
  };
  r.readAsDataURL(f);
}

function savePlayerModal(){
  // Read from DOM inputs - always reliable
  var fEl=document.getElementById('pl_first');
  var lEl=document.getElementById('pl_last');
  var nEl=document.getElementById('pl_num');
  var pEl=document.getElementById('pl_pos');
  var tidEl=document.getElementById('pl_tid');
  var pidEl=document.getElementById('pl_pid');
  console.log('savePlayerModal called, fEl=',fEl,'tidEl=',tidEl,'_PF=',window._PF);
  if(!fEl||!tidEl){toast('pl_first ou pl_tid introuvable dans le DOM','red');return;}
  var first=(fEl.value||'').trim();
  if(!first){toast('Le prénom est obligatoire','red');return;}
  var tid=parseInt(tidEl.value)||0;
  var pid=parseInt(pidEl?pidEl.value:0)||0;
  var photo=(window._PF&&window._PF.photo)||null;
  var team=gT(tid);if(!team){toast('Équipe introuvable','red');return;}
  if(pid){
    var pl=team.players.find(function(p){return p.id===pid;});
    if(pl){
      pl.first=first;
      pl.last=(lEl?lEl.value||'':'').trim();
      pl.pos=(pEl?pEl.value||'':'').trim();
      pl.num=(nEl?nEl.value||'':'').trim();
      if(photo)pl.photo=photo;
    }
  } else {
    team.players.push({id:nid(),first:first,last:(lEl?lEl.value||'':'').trim(),pos:(pEl?pEl.value||'':'').trim(),num:(nEl?nEl.value||'':'').trim(),photo:photo});
  }
  window._PF=null;
  saveDB();
  document.getElementById('modalContainer').innerHTML='';
  _expT=tid;
  renderPage();
  toast('✓ Joueur enregistré','acc');
}

function openMatchForm(){_mFS=true;_eMId=null;_mf={round:'',teamId:'',home:true,opp:'',date:'',champ:'',players:[],videoFile:null,videoURL:null,videos:[],liveUrl:'',liveMode:false};_showCal=false;navTo('matches');}
function toggleLiveMode(){_mf.liveMode=!_mf.liveMode;_mf.videos=[];_mf.videoFile=null;_mf.videoURL=null;_mf.liveUrl='';renderPage();}
function saveOpp(){var el=document.getElementById('mf_o');if(el)_mf.opp=el.value;}
function toggleMP(pid){var i=_mf.players.indexOf(pid);if(i>=0)_mf.players.splice(i,1);else _mf.players.push(pid);renderPage();}
function addVideoToMatch(inp){
  var f=inp.files[0];if(!f)return;
  var url=URL.createObjectURL(f);
  if(!_mf.videos)_mf.videos=[];
  // Proposer un label par défaut intelligent
  var idx=_mf.videos.length;
  var defaultLabels=['Match complet','1ère mi-temps','2ème mi-temps','QT1','QT2','QT3','QT4'];
  var label=defaultLabels[idx]||('Vidéo '+(idx+1));
  _mf.videos.push({name:f.name,url:url,label:label,file:f});
  // Compat: garder videoFile/videoURL sur la première vidéo
  if(idx===0){_mf.videoFile=f.name;_mf.videoURL=url;}
  renderPage();
}
function removeVideo(vi){
  if(!_mf.videos)return;
  _mf.videos.splice(vi,1);
  if(_mf.videos.length>0){_mf.videoFile=_mf.videos[0].name;_mf.videoURL=_mf.videos[0].url;}
  else{_mf.videoFile=null;_mf.videoURL=null;}
  renderPage();
}
function editVideoLabel(vi){
  var v=_mf.videos&&_mf.videos[vi];if(!v)return;
  var newLabel=prompt('Renommer cette vidéo :',v.label);
  if(newLabel&&newLabel.trim())_mf.videos[vi].label=newLabel.trim();
  renderPage();
}
function saveMatch(){
  var f=_mf;if(!f.teamId)return;
  if(_eMId){
    var oldM=gM(_eMId);
    var oldOutcome=oldM?oldM.outcome:'-';
    var oldScore={A:oldM?oldM.scoreA:0,B:oldM?oldM.scoreB:0};
    var oldTeamId=oldM?oldM.teamId:null;
    // Reverse old team stats if match was closed
    if(oldM&&oldOutcome&&oldOutcome!=='-'&&oldOutcome!==''){
      var oldTeam=gT(oldTeamId);
      if(oldTeam){
        var wasHome=oldM.home;
        var oldTeamPts=wasHome?oldScore.A:oldScore.B;
        var oldOppPts=wasHome?oldScore.B:oldScore.A;
        oldTeam.mCount=Math.max(0,(oldTeam.mCount||0)-1);
        oldTeam.ptsFor=Math.max(0,(oldTeam.ptsFor||0)-oldTeamPts);
        oldTeam.ptsAgainst=Math.max(0,(oldTeam.ptsAgainst||0)-oldOppPts);
        if(oldOutcome==='V')oldTeam.wins=Math.max(0,(oldTeam.wins||0)-1);
        else if(oldOutcome==='D')oldTeam.losses=Math.max(0,(oldTeam.losses||0)-1);
      }
    }
    // Update match
    DB.matches.forEach(function(m){
      if(m.id===_eMId){
        var videos=(f.videos||[]).map(function(v){return{label:v.label,name:v.name,url:v.url||null};});
        Object.assign(m,{round:f.round,teamId:parseInt(f.teamId),opp:f.opp,home:f.home,date:f.date,champ:f.champ,players:f.players.slice(),videoFile:f.videoFile,videoURL:f.videoURL,videos:videos,liveUrl:f.liveUrl||'',liveMode:!!f.liveMode,status:f.status||m.status,outcome:f.outcome!==undefined?f.outcome:m.outcome});
      }
    });
    // Save new video blobs to IndexedDB
    if(f.videos)f.videos.forEach(function(v,vi){if(v.file){saveVideoBlob(_eMId+'_'+vi,v.file,function(){});}});
    // Apply new team stats if match is now closed
    var newM=gM(_eMId);
    var newOutcome=newM?newM.outcome:'-';
    if(newM&&newOutcome&&newOutcome!=='-'&&newOutcome!==''){
      var newTeam=gT(parseInt(f.teamId));
      if(newTeam){
        var isHome=newM.home;
        var teamPts=isHome?newM.scoreA:newM.scoreB;
        var oppPts=isHome?newM.scoreB:newM.scoreA;
        newTeam.mCount=(newTeam.mCount||0)+1;
        newTeam.ptsFor=(newTeam.ptsFor||0)+teamPts;
        newTeam.ptsAgainst=(newTeam.ptsAgainst||0)+oppPts;
        if(newOutcome==='V')newTeam.wins=(newTeam.wins||0)+1;
        else if(newOutcome==='D')newTeam.losses=(newTeam.losses||0)+1;
      }
    }
  } else {
    var newId=nid();
    var videos=(f.videos||[]).map(function(v){return{label:v.label,name:v.name,url:v.url||null};});
    DB.matches.push({id:newId,round:f.round,teamId:parseInt(f.teamId),opp:f.opp,home:f.home,date:f.date,champ:f.champ,scoreA:0,scoreB:0,status:'À coder',outcome:'-',players:f.players.slice(),videoFile:f.videoFile,videoURL:f.videoURL,videos:videos,liveUrl:f.liveUrl||'',liveMode:!!f.liveMode});
    // Save video blobs to IndexedDB
    if(f.videos)f.videos.forEach(function(v,vi){if(v.file){saveVideoBlob(newId+'_'+vi,v.file,function(){});}});
  }

}

function renderRentabilite(seqs, board){
  // Seqs ATT uniquement (exclure DEF pour PPP)
  // On calcule pour toutes les familles, en les séparant
  if(!seqs||!seqs.length){
    return '<div style="padding:24px;text-align:center;font-size:14px;color:var(--txt3);">Aucune séquence codée pour l\'instant.</div>';
  }

  // Regrouper : famille → sous-famille → action → liste de séquences
  var tree={};
  seqs.forEach(function(s){
    var fam=s.family||'?';
    var sub=s.sub||'?';
    var act=s.action||'?';
    if(!tree[fam])tree[fam]={};
    if(!tree[fam][sub])tree[fam][sub]={};
    if(!tree[fam][sub][act])tree[fam][sub][act]=[];
    tree[fam][sub][act].push(s);
  });

  function calcStats(seqList){
    var n=seqList.length;
    var totalPts=0;
    var hasPts=false;
    var byResult={};
    seqList.forEach(function(s){
      var res=s.result||'?';
      if(!byResult[res])byResult[res]=0;
      byResult[res]++;
      if(s.resultPts!=null){totalPts+=s.resultPts;hasPts=true;}
    });
    var ppp=hasPts&&n>0?(totalPts/n):null;
    var scored=seqList.filter(function(s){return s.resultPts!=null&&s.resultPts>0;}).length;
    var pct=n>0?Math.round(scored/n*100):0;
    return{n:n,totalPts:totalPts,ppp:ppp,pct:pct,byResult:byResult,hasPts:hasPts};
  }

  function pppColor(ppp){
    if(ppp==null)return'var(--txt3)';
    if(ppp>=1.0)return'var(--grn)';
    if(ppp>=0.51)return'var(--acc)';
    return'var(--red)';
  }
  function pctBar(pct,color){
    return'<div style="height:4px;border-radius:3px;background:var(--bdr);margin-top:3px;overflow:hidden;">'
      +'<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:3px;transition:width 0.4s;"></div></div>';
  }

  var h='<div style="padding:12px;overflow-y:auto;flex:1;">';

  Object.keys(tree).forEach(function(fam){
    // Total famille
    var famSeqs=[];
    Object.values(tree[fam]).forEach(function(subs){Object.values(subs).forEach(function(acts){acts.forEach(function(s){famSeqs.push(s);});});});
    var famSt=calcStats(famSeqs);
    var famColor=pppColor(famSt.ppp);

    h+='<div style="margin-bottom:18px;border:1px solid var(--bdr);border-radius:var(--rsm);overflow:hidden;">';
    // En-tête famille
    h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--acc-d);border-bottom:1px solid rgba(212,170,106,0.2);">'
      +'<div style="font-size:15px;font-weight:800;color:var(--acc);">'+fam+'</div>'
      +'<div style="margin-left:auto;display:flex;align-items:center;gap:14px;">'
      +'<div style="text-align:right;"><div style="font-size:11px;color:var(--txt3);">Possessions</div><div style="font-size:16px;font-weight:800;color:var(--txt);">'+famSt.n+'</div></div>'
      +(famSt.hasPts
        ?'<div style="text-align:right;"><div style="font-size:11px;color:var(--txt3);">Total pts</div><div style="font-size:16px;font-weight:800;color:var(--txt);">'+famSt.totalPts.toFixed(1)+'</div></div>'
         +'<div style="text-align:right;"><div style="font-size:11px;color:var(--txt3);">PPP</div><div style="font-size:20px;font-weight:900;color:'+famColor+';">'+famSt.ppp.toFixed(2)+'</div></div>'
         +'<div style="text-align:right;"><div style="font-size:11px;color:var(--txt3);">% réussite</div><div style="font-size:16px;font-weight:800;color:'+famColor+';">'+famSt.pct+'%</div></div>'
        :'<div style="font-size:12px;color:var(--txt3);font-style:italic;">Configurez les pts dans l\'éditeur de tableaux</div>'
      )
      +'</div></div>';

    // Sous-familles
    Object.keys(tree[fam]).forEach(function(sub){
      var subSeqs=[];
      Object.values(tree[fam][sub]).forEach(function(acts){acts.forEach(function(s){subSeqs.push(s);});});
      var subSt=calcStats(subSeqs);
      var subColor=pppColor(subSt.ppp);

      // Header sous-famille
      h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--surf2);border-bottom:1px solid var(--bdr);">'
        +'<div style="width:3px;height:13px;background:var(--acc);border-radius:2px;"></div>'
        +'<div style="font-size:13px;font-weight:700;color:var(--txt);">'+sub+'</div>'
        +'<div style="margin-left:auto;display:flex;align-items:center;gap:12px;">'

        +(subSt.hasPts
          ?'<span style="font-size:13px;font-weight:800;color:'+subColor+';">PPP '+subSt.ppp.toFixed(2)+'</span>'
           +'<span style="font-size:12px;color:'+subColor+';">'+subSt.pct+'%</span>'
          :'')
        +'</div></div>';

      // Actions
      Object.keys(tree[fam][sub]).forEach(function(act){
        var actSeqs=tree[fam][sub][act];
        var actSt=calcStats(actSeqs);
        var actColor=pppColor(actSt.ppp);

        h+='<div style="padding:8px 14px 8px 26px;border-bottom:1px solid var(--bdr);background:var(--surf);">';
        h+='<div style="display:flex;align-items:flex-start;gap:8px;">';
        h+='<div style="flex:1;">';
        h+='<div style="font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:4px;">'+act+'</div>';

        h+='<div style="display:flex;flex-direction:column;gap:3px;margin-top:5px;">';
        Object.keys(actSt.byResult).forEach(function(res){
          var cnt=actSt.byResult[res];

          var isGood=res.indexOf('PTS')>=0||res.indexOf('pts')>=0||res.indexOf('Panier')>=0||res.indexOf('Faute')>=0||res.indexOf('marqué')>=0;
          var barCol=isGood?'var(--grn)':'var(--red)';
          h+='<div style="display:flex;align-items:center;gap:6px;">'
            +'<div style="width:90px;font-size:11px;color:var(--txt2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+res+'</div>'
            +'<div style="flex:1;height:5px;border-radius:3px;background:var(--bdr);overflow:hidden;">'
            +'<div style="height:100%;width:'+pct2+'%;background:'+barCol+';border-radius:3px;"></div></div>'
            +'<div style="font-size:11px;font-weight:800;color:'+(isGood?'var(--grn)':'var(--txt3)')+';">'+pct2+'%</div>'
            +'</div>';
        });
        h+='</div>';
        if(actSt.hasPts)h+=pctBar(actSt.pct,actColor);
        h+='</div>';
        // Métriques droite
        h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:80px;">';
        h+='<div style="font-size:12px;color:var(--txt3);">'+actSt.n+' poss.</div>';
        if(actSt.hasPts){
          h+='<div style="font-size:18px;font-weight:900;color:'+actColor+';line-height:1;">'+actSt.ppp.toFixed(2)+'<span style="font-size:10px;font-weight:600;opacity:0.7;margin-left:2px;">PPP</span></div>';

          h+='<div style="font-size:11px;color:var(--txt3);">'+actSt.totalPts.toFixed(1)+' pts</div>';
        }
        h+='</div></div></div>';
      });
    });
    h+='</div>';
  });

  h+='<div style="margin-top:8px;padding:9px 12px;border-radius:var(--rsm);background:var(--acc-d);font-size:12px;color:var(--txt2);">ℹ️ <b style="color:var(--acc);">PPP</b> = Points Par Possession. Configurez la valeur de chaque résultat dans <b>Éditeur de tableaux → modifier un nœud Résultat</b>.</div>';

function replaySeq(id){
  var s=DB.sequences.find(function(x){return x.id===id;});
  if(!s)return;
  var startSec=mmssToSec(s.debut);
  var endSec=mmssToSec(s.fin);
  if(!vid.duration){toast('Pas de vidéo chargée','red');return;}
  pauseVideo();
  vid.currentTime=Math.max(0,startSec);
  vid.addEventListener('seeked',function(){
    vid.play().catch(function(){});
    function checkEnd(){
      if(vid.currentTime>=endSec){vid.pause();vid.currentTime=endSec;return;}
      if(!vid.paused)requestAnimationFrame(checkEnd);
    }
    checkEnd();
  },{once:true});
}

function addStat(key,val,sv,shot,made){
  pauseVideo();
  if(shot){openShotModal(key,val,sv,made);return;}
  var pid=CS.statPlayer,target=CS.statsTarget;
  if(pid&&target==='player'){var s=gPS(CS.matchId,pid);s[key]=(s[key]||0)+val;recalc(CS.matchId,pid);}
  // Log every stat event (player, collective or adverse)
  pushLog(CS.matchId,{type:'stat',pid:pid||null,key:key,qt:CS.qt,target:target});
  if(sv>0){
    var m=curMatch(),isHome=m&&m.home,toTeam=(target==='player'||target==='collectif');
    var scoredPts=sv;
    if(toTeam){if(isHome)CS.scoreA+=sv;else CS.scoreB+=sv;}
    else{if(isHome)CS.scoreB+=sv;else CS.scoreA+=sv;}
    if(m){m.scoreA=CS.scoreA;m.scoreB=CS.scoreB;}
    // Update +/- for on-court players
    updatePM(scoredPts,toTeam);
  }
  // After stat, reset selected player and target
  CS.statPlayer=null;CS.statsTarget='player';
  resumeVideo();renderCourtCol();renderActionPanel();saveDB();
}

function confirmShot(key,val,sv,made){
  var sv2=document.getElementById('shotSvg'),x=sv2?sv2._px:null,y=sv2?sv2._py:null;
  var pid=CS.statPlayer,target=CS.statsTarget;
  if(pid&&target==='player'){
    var s=gPS(CS.matchId,pid);s[key]=(s[key]||0)+val;s.shots=s.shots||[];
    var assistPid=window._assistPid||null;window._assistPid=null;window._assistAdv=null;
    var shotIdx=s.shots.length;
    s.shots.push({x:x,y:y,made:made,qt:CS.qt,assistPid:assistPid,key:key});
    pushLog(CS.matchId,{type:'shot',pid:pid,key:key,qt:CS.qt,shotIdx:shotIdx,made:made,target:CS.statsTarget});
    if(made&&assistPid){var as2=gPS(CS.matchId,assistPid);as2.pd=(as2.pd||0)+1;recalc(CS.matchId,assistPid);}
    recalc(CS.matchId,pid);
  }
  // Store adverse shot in DB + log
  if(target==='adverse'){
    // Store shot position for shot chart
    if(!DB.adverseShots)DB.adverseShots={};
    if(!DB.adverseShots[CS.matchId])DB.adverseShots[CS.matchId]=[];
    DB.adverseShots[CS.matchId].push({x:x,y:y,made:made,qt:CS.qt,key:key});
    pushLog(CS.matchId,{type:'stat',pid:null,key:key,qt:CS.qt,target:'adverse'});
    if(made&&window._assistAdv===true){
      pushLog(CS.matchId,{type:'stat',pid:null,key:'pd',qt:CS.qt,target:'adverse'});
    }
  }
  window._assistPid=null;window._assistAdv=null;
  if(sv>0){
    var m=curMatch(),isHome=m&&m.home,toTeam=(target==='player'||target==='collectif');
    if(toTeam){if(isHome)CS.scoreA+=sv;else CS.scoreB+=sv;}
    else{if(isHome)CS.scoreB+=sv;else CS.scoreA+=sv;}
    if(m){m.scoreA=CS.scoreA;m.scoreB=CS.scoreB;}
    updatePM(sv,toTeam);
  }
  // Reset after confirm
  window._lastShotTarget=CS.statsTarget;
  CS.statPlayer=null;CS.statsTarget='player';
  closeModal();
  // If missed shot, ask who got the rebound
  if(!made){
    openReboundModal();
  } else {
    resumeVideo();renderCourtCol();renderActionPanel();saveDB();
  }
}

    b.style.border=isSelected?'2px solid var(--acc)':'1px solid var(--bdr2)';
    b.style.background=isSelected?'var(--acc-d)':'var(--surf2)';
    b.style.color=isSelected?'var(--acc)':'var(--txt)';
  });
}
function setAssistAdv(val){

  }

    b.style.border='2px solid var(--bdr2)';b.style.background='var(--surf2)';

    b.style.border='2px solid var(--bdr2)';b.style.background='var(--surf2)';

function confirmRebound(){
  var sel=window._rebSelected;
  var rebKey=window._rebKey||'rebd';
  window._rebSelected=null;window._rebKey=null;window._rebIsAdverse=false;
  if(sel==='adverse'){
    // Log adverse rebound (opposite key)
    var advRebKey=rebKey==='rebo'?'rebd':'rebo';
    pushLog(CS.matchId,{type:'stat',pid:null,key:advRebKey,qt:CS.qt,target:'adverse'});
    saveDB();closeModal();resumeVideo();renderCourtCol();renderActionPanel();
    toast('✓ Rebond adverse enregistré','acc');
  } else {
    giveRebound(sel,rebKey);
  }
}

function giveRebound(pid,rebKey){
  if(pid&&rebKey){
    var s=gPS(CS.matchId,pid);
    s[rebKey]=(s[rebKey]||0)+1;
    recalc(CS.matchId,pid);
    pushLog(CS.matchId,{type:'stat',pid:pid,key:rebKey,qt:CS.qt,target:'player'});
    toast('✓ Rebond enregistré','acc');
  }
  saveDB();closeModal();resumeVideo();renderCourtCol();renderActionPanel();
}

function clickAction(aId){var board=curBoard();if(!board)return;var node=board.nodes.find(function(n){return n.id===aId;});if(!node)return;CS._t=currentTime();pauseVideo();CS.pendingAct=node;CS.preroll=false;CS.pendingRes=null;renderActionPanel();}
function clickResult(rId){var board=curBoard();var node=board&&board.nodes.find(function(n){return n.id===rId;});if(!node)return;CS.pendingRes=node;CS.preroll=true;renderActionPanel();}
function cancelAction(){CS.pendingAct=null;CS.pendingRes=null;CS.pendingSub=null;CS.preroll=false;resumeVideo();renderActionPanel();}
function validateSeq(){
  var board=curBoard(),pa=CS.pendingAct,pr=CS.pendingRes;if(!pa||!pr)return;
  var fam=bgF(board,pa.id),sub=bgS(board,pa.id),team=curTeam(),mode=CS.mode,player='Équipe',playerId=null;
  if(CS.pendingSub){
    sub=CS.pendingSub;
    var famNode=bgF(board,CS.pendingSub.id);
    if(famNode)fam=famNode;
  }
  if(mode==='individuel'){var pid2=CS.indivMode==='highlight'?CS.hlPlayer:CS.selPlayer;var p2=pid2&&team&&team.players.find(function(x){return x.id===pid2;});player=p2?p2.first+' '+p2.last:'?';playerId=pid2;}
  var finS=(CS._t||0)+CS.chosenPO,debS=Math.max(0,finS-CS.chosenPR-CS.chosenPO);
  // Récupérer la valeur en points du résultat depuis le board
  var resultPts = (pr.pts != null) ? pr.pts : null;
  DB.sequences.push({id:nid(),matchId:CS.matchId,mode:mode,family:fam?fam.label:'?',sub:sub?sub.label:'?',action:pa.label,result:pr.label,resultPts:resultPts,debut:fmtTime(debS),fin:fmtTime(finS),player:player,playerId:playerId,qt:CS.qt,preroll:CS.chosenPR,videoIdx:_currentVideoIdx});
  if(mode==='individuel'&&CS.indivMode==='perf')CS.selPlayer=null;
  CS.pendingAct=null;CS.pendingRes=null;CS.pendingSub=null;CS.preroll=false;
  if(mode==='individuel')CS.selPlayer=null;
  if(vid.duration)vid.currentTime=finS;
  resumeVideo();saveDB();renderSeqPanel();renderActionPanel();
}

function deleteShotEntry(pid,si){
  var s=gPS(CS.matchId,pid);
  if(!s.shots||si>=s.shots.length)return;
  var sh=s.shots[si];
  // Reverse the stat
  if(sh.made){
    if(sh.key==='pts2m')s.pts2m=Math.max(0,(s.pts2m||0)-1);
    else if(sh.key==='pts3m')s.pts3m=Math.max(0,(s.pts3m||0)-1);
    else if(sh.key==='lfm')s.lfm=Math.max(0,(s.lfm||0)-1);
  } else {
    if(sh.key==='pts2r')s.pts2r=Math.max(0,(s.pts2r||0)-1);
    else if(sh.key==='pts3r')s.pts3r=Math.max(0,(s.pts3r||0)-1);
    else if(sh.key==='lfr')s.lfr=Math.max(0,(s.lfr||0)-1);
  }
  // Remove assist pd if was there
  if(sh.made&&sh.assistPid){var as2=gPS(CS.matchId,sh.assistPid);as2.pd=Math.max(0,(as2.pd||0)-1);recalc(CS.matchId,sh.assistPid);}
  s.shots.splice(si,1);
  recalc(CS.matchId,pid);
  saveDB();
  renderStatsModalContent();
}

function saveEditShot(oldPid,si){
  var newPidEl=document.getElementById('editShot_player');
  var typeEl=document.getElementById('editShot_type');
  var qtEl=document.getElementById('editShot_qt');
  var assistEl=document.getElementById('editShot_assist');
  var svgEl=document.getElementById('editShotSvg');
  if(!newPidEl||!typeEl)return;
  var newPid=parseInt(newPidEl.value);
  var newType=typeEl.value;
  var newQt=parseInt(qtEl?qtEl.value:1)||1;
  var newAssistPid=assistEl&&assistEl.value?parseInt(assistEl.value):null;
  var newX=svgEl?svgEl._px:null,newY=svgEl?svgEl._py:null;
  var SHOT_TYPES={pts2m:true,pts3m:true,lfm:true,pts2r:false,pts3r:false,lfr:false};
  var newMade=SHOT_TYPES[newType]||false;
  var SHOT_SV={pts2m:2,pts3m:3,lfm:1,pts2r:0,pts3r:0,lfr:0};

  // Remove old entry from old player
  var oldS=gPS(CS.matchId,oldPid);
  if(!oldS.shots||si>=oldS.shots.length)return;
  var oldSh=oldS.shots[si];
  // Reverse old stat
  if(oldSh.key&&oldS[oldSh.key]>0)oldS[oldSh.key]=Math.max(0,(oldS[oldSh.key]||0)-1);
  // Reverse old score contribution
  var oldSV=SHOT_SV[oldSh.key]||0;
  if(oldSV>0){var mo=curMatch(),isHome=mo&&mo.home;if(isHome)CS.scoreA=Math.max(0,CS.scoreA-oldSV);else CS.scoreB=Math.max(0,CS.scoreB-oldSV);if(mo){mo.scoreA=CS.scoreA;mo.scoreB=CS.scoreB;}}
  // Reverse old assist
  if(oldSh.made&&oldSh.assistPid){var aOld=gPS(CS.matchId,oldSh.assistPid);aOld.pd=Math.max(0,(aOld.pd||0)-1);recalc(CS.matchId,oldSh.assistPid);}
  // Remove shot
  oldS.shots.splice(si,1);
  recalc(CS.matchId,oldPid);

  // Add new entry to new player
  var newS=gPS(CS.matchId,newPid);
  newS[newType]=(newS[newType]||0)+1;
  newS.shots=newS.shots||[];
  newS.shots.push({x:newX,y:newY,made:newMade,qt:newQt,assistPid:newAssistPid,key:newType});
  // Add new score
  var newSV=SHOT_SV[newType]||0;
  if(newSV>0){var mo2=curMatch(),isHome2=mo2&&mo2.home;if(isHome2)CS.scoreA+=newSV;else CS.scoreB+=newSV;if(mo2){mo2.scoreA=CS.scoreA;mo2.scoreB=CS.scoreB;}}
  // Add new assist
  if(newMade&&newAssistPid){var aNew=gPS(CS.matchId,newAssistPid);aNew.pd=(aNew.pd||0)+1;recalc(CS.matchId,newAssistPid);}
  recalc(CS.matchId,newPid);
  saveDB();
  closeModal();
  renderStatsModalContent();
}

function toggleExpSeq(seqId,checked){

  var row=document.querySelector('[data-seqid="'+seqId+'"]');

var _dragSrcIdx=null;
function _seqDragStart(e,idx){
  _dragSrcIdx=idx;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.5';
}
function _seqDragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  e.currentTarget.style.background='var(--acc-d)';
}
function _seqDrop(e,idx){
  e.preventDefault();
  e.currentTarget.style.background='var(--surf)';
  if(_dragSrcIdx===null||_dragSrcIdx===idx){_dragSrcIdx=null;return;}
  // Rebuild order from current rendered sequence IDs
  var rows=document.querySelectorAll('[data-seqid]');
  var ids=Array.from(rows).map(function(r){return parseInt(r.getAttribute('data-seqid'));});
  // Move from src to dst
  var moved=ids.splice(_dragSrcIdx,1)[0];
  ids.splice(idx,0,moved);
  _customSeqOrder=ids;
  _dragSrcIdx=null;
  renderPage();
}

function getFilteredSeqs(){
  return DB.sequences.filter(function(s){
    if(_expState.matchIds.length&&_expState.matchIds.indexOf(s.matchId)<0)return false;
    if(_expState.mode&&s.mode!==_expState.mode)return false;
    if(_expState.family!=='Tous'&&s.family!==_expState.family)return false;
    if(_expState.sub!=='Tous'&&s.sub!==_expState.sub)return false;
    if(_expState.action!=='Tous'&&s.action!==_expState.action)return false;
    if(_expState.result!=='Tous'&&s.result!==_expState.result)return false;
    if(_expState.player!=='Tous'&&s.player!==_expState.player)return false;
    if(_expState.qt!=='Tous'&&String(s.qt)!==_expState.qt)return false;
    return true;
  });
}

function mmssToSec(mmss){
  var parts=(mmss||'0:0').split(':');
  return parseInt(parts[0]||0)*60+parseInt(parts[1]||0);
}

async function exportClips(){
  var filtered=getFilteredSeqs();
  if(_customSeqOrder){
    var _idMap2={};filtered.forEach(function(s){_idMap2[s.id]=s;});
    var _reordered2=[];
    _customSeqOrder.forEach(function(id){if(_idMap2[id])_reordered2.push(_idMap2[id]);});
    filtered.forEach(function(s){if(_customSeqOrder.indexOf(s.id)<0)_reordered2.push(s);});
    filtered=_reordered2;
  }
  // N'exporter que les séquences cochées
  if(_expSelectedIds&&_expSelectedIds.length>0){
    filtered=filtered.filter(function(s){return _expSelectedIds.indexOf(s.id)>=0;});
  }
  if(!filtered.length){toast('Aucune séquence à exporter','red');return;}
  var pb=document.getElementById('exportProgress');
  if(pb)pb.style.display='block';
  var btn=document.querySelector('[onclick="exportClips()"]');
  if(btn){btn.disabled=true;btn.style.opacity='0.5';}

  setExportStatus('Chargement des vidéos…',2,'Restauration depuis IndexedDB…');

  // Collecter les matchIds uniques
  var matchIds=[];
  filtered.forEach(function(s){if(matchIds.indexOf(s.matchId)<0)matchIds.push(s.matchId);});

  // Restaurer toutes les URLs depuis IndexedDB (blob URLs expirées entre sessions)
  await new Promise(function(resolve){
    var total=0;var done=0;
    function tryResolve(){done++;if(done>=total)resolve();}
    matchIds.forEach(function(mid){
      var m=gM(mid);if(!m)return;
      if(m.videos&&m.videos.length){
        // Nouveau format multi-vidéo : clés matchId_0, matchId_1...
        m.videos.forEach(function(v,vi){
          total++;
          loadVideoBlob(mid+'_'+vi,function(entry){
            if(entry)v.url=URL.createObjectURL(entry.blob);
            else v.url=null;
            tryResolve();
          });
        });
      } else {
        // Ancien format vidéo unique : clé matchId
        total++;
        loadVideoBlob(mid,function(entry){
          if(entry){m.videoURL=URL.createObjectURL(entry.blob);m.videoFile=entry.name;}
          else m.videoURL=null;
          tryResolve();
        });
      }
    });
    if(total===0)resolve();
  });

  // Construire la map vidéo après restauration
  var matchVideoMap={};
  filtered.forEach(function(s){
    var m=gM(s.matchId);if(!m)return;
    if(matchVideoMap[s.matchId])return;
    if(m.videos&&m.videos.length){
      var available=m.videos.filter(function(v){return v.url;});
      if(available.length){matchVideoMap[s.matchId]=available;return;}
    }
    if(m.videoURL)matchVideoMap[s.matchId]=[{label:'Match complet',url:m.videoURL}];
  });

  var missingVideo=filtered.filter(function(s){return!matchVideoMap[s.matchId];});
  if(missingVideo.length){
    var names=[];missingVideo.forEach(function(s){var m=gM(s.matchId);if(m&&names.indexOf('J'+m.round)<0)names.push('J'+m.round);});
    setExportStatus('⚠️ Vidéo manquante',0,'Matchs sans vidéo : '+names.join(', '));
    if(btn){btn.disabled=false;btn.style.opacity='';}return;
  }

  var clips=[];
  filtered.forEach(function(s){
    var videos=matchVideoMap[s.matchId]||[];
    var videoUrl=null;
    if(videos.length===0){return;}
    else if(videos.length===1){
      videoUrl=videos[0].url;
    } else {
      // Priorité 1 : videoIdx enregistré au moment du codage (le plus fiable)
      if(s.videoIdx!=null&&videos[s.videoIdx]&&videos[s.videoIdx].url){
        videoUrl=videos[s.videoIdx].url;
      } else {
        // Priorité 2 : correspondance par label QT (fallback pour anciennes séquences)
        var qt=String(s.qt||'1');
        var match=videos.find(function(v){return v.label&&(v.label.indexOf('QT'+qt)>=0||v.label.indexOf('QT '+qt)>=0);});
        if(!match){
          var qtNum=parseInt(qt);
          if(qtNum<=2)match=videos.find(function(v){return v.label&&v.label.indexOf('1ère')>=0;});
          else match=videos.find(function(v){return v.label&&v.label.indexOf('2ème')>=0;});
        }
        videoUrl=(match||videos[0]).url;
      }
    }
    if(videoUrl)clips.push({url:videoUrl,start:mmssToSec(s.debut),end:mmssToSec(s.fin),label:'QT'+s.qt+' | '+(s.family||'')+(s.action?' | '+s.action:'')+(s.result?' | '+s.result:'')+(s.player&&s.player!=='Équipe'?' | '+s.player:'')});
  });
  setExportStatus('Initialisation…',3,'Encodage H.264 → MP4 compatible QuickTime');
  var canvas=document.createElement('canvas');
  canvas.width=1280;canvas.height=720;
  var ctx=canvas.getContext('2d');
  var showBandeau=_expState.showBandeau;
  setExportStatus('Démarrage…',5,'');
  var mimeType='video/mp4;codecs=avc1';
  var ext='mp4';
  if(!MediaRecorder.isTypeSupported(mimeType)){
    mimeType='video/mp4';
    if(!MediaRecorder.isTypeSupported(mimeType)){mimeType='video/webm;codecs=vp9';ext='webm';}
  }
  setExportStatus('Encodage…',7,'Format : '+ext.toUpperCase());
  var stream=canvas.captureStream(30);
  var recorder;
  try{recorder=new MediaRecorder(stream,{mimeType:mimeType,videoBitsPerSecond:8000000});}
  catch(e){recorder=new MediaRecorder(stream,{videoBitsPerSecond:8000000});ext='webm';}
  var chunks=[];
  recorder.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data);};
  recorder.onstop=function(){
    setExportStatus('Finalisation…',97,'');
    var blob=new Blob(chunks,{type:recorder.mimeType||'video/mp4'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='BasketTaggPro_'+filtered.length+'clips.'+ext;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},3000);
    setExportStatus('✓ Terminé — '+filtered.length+' clips',100,'Fichier .'+ext+' téléchargé');
    toast('✓ Export '+ext.toUpperCase()+' — '+filtered.length+' clips','acc');
    if(btn){btn.disabled=false;btn.style.opacity='';}
  };
  recorder.start(200);
  await renderClipsToCanvas(canvas,ctx,clips,filtered,showBandeau,function(){recorder.stop();});
}

function renderClipsToCanvas(canvas,ctx,clips,filtered,showBandeau,onDone,onFrameCb){
  return new Promise(function(resolve){
    var clipIdx=0;
    function nextClip(){
      if(clipIdx>=clips.length){if(onDone)onDone();resolve();return;}
      var clip=clips[clipIdx];
      setExportStatus('Clip '+(clipIdx+1)+'/'+clips.length,10+Math.round(clipIdx/clips.length*85),clip.label);
      var v=document.createElement('video');
      v.muted=true;v.playsInline=true;v.preload='auto';
      var raf=null;

      function releaseAndNext(){
        cancelAnimationFrame(raf);
        try{v.pause();}catch(e){}
        v.removeAttribute('src');
        v.load(); // libère la mémoire
        v=null;
        clipIdx++;
        nextClip(); // transition instantanée
      }

      function draw(){
        if(v.currentTime>=clip.end||v.ended){
          releaseAndNext();return;
        }
        try{ctx.drawImage(v,0,0,1280,720);}catch(e){}
        if(showBandeau){
          ctx.fillStyle='rgba(0,0,0,0.62)';ctx.fillRect(0,668,1280,52);
          ctx.fillStyle='#D4AA6A';ctx.font='bold 20px Arial,sans-serif';
          ctx.fillText(clip.label,16,698);
          ctx.fillStyle='rgba(212,170,106,0.55)';ctx.font='14px monospace';
          ctx.fillText((v.currentTime-clip.start).toFixed(1)+'s',1210,698);
        }
        if(onFrameCb)onFrameCb(clipIdx);
        raf=requestAnimationFrame(draw);
      }

      v.addEventListener('loadedmetadata',function(){
        v.currentTime=Math.max(0,clip.start);
      },{once:true});

      v.addEventListener('seeked',function(){
        v.play().catch(function(){});
        raf=requestAnimationFrame(draw);
      },{once:true});

      v.src=clip.url;
      v.load();
    }
    nextClip();
  });
}

      h+='<button onclick="toggleEsQt(\''+q+'\')" style="padding:8px 20px;border-radius:var(--rsm);border:1.5px solid '+(sel?'var(--acc)':'var(--bdr2)')+';background:'+(sel?'var(--acc-d)':'var(--surf2)')+';color:'+(sel?'var(--acc)':'var(--txt2)')+';font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">QT'+q+'</button>';
    });
    h+='</div></div>';
  }

  if(_esState.type==='rentabilite'){
    var rentSeqs=[];
    _esState.matchIds.forEach(function(mid){
      DB.sequences.filter(function(s){return s.matchId===mid&&s.mode==='collectif';}).forEach(function(s){rentSeqs.push(s);});
    });
    h+='<div class="card" style="padding:18px;margin-bottom:14px;">'
      +'<div style="font-size:13px;font-weight:700;color:var(--acc);margin-bottom:12px;">📈 Aperçu rentabilité — '+rentSeqs.length+' séquences collectif</div>'
      +(_esState.matchIds.length>0&&rentSeqs.length>0
        ? renderRentabilite(rentSeqs,null)
        : '<div style="font-size:13px;color:var(--txt3);">Sélectionnez des matchs avec des séquences codées en mode Collectif.</div>')
      +'</div>';
  }

  // Generate button
  var canGenerate=_esState.matchIds.length>0&&(_esState.type==='rentabilite'||_esState.playerIds.length>0||_esState.type==='shotchart');
  var btnStyle='height:44px;font-size:15px;padding:0 28px;'+(canGenerate?'':'opacity:0.5;cursor:not-allowed;');
  h+='<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:4px;">';
  if(_esState.type==='rentabilite'){
    h+='<button class="btn bp" onclick="generateRentabilitePDF()" style="'+btnStyle+'">📈 Exporter PDF Rentabilité</button>';
  } else if(_esState.type==='shotchart'){
    h+='<button class="btn bg" onclick="_esState._teamShot=false;generateShotChartPDF()" style="'+btnStyle+'">📋 Shot chart par joueur</button>';
    h+='<button class="btn bp" onclick="_esState._teamShot=true;generateShotChartPDF()" style="height:44px;font-size:15px;padding:0 28px;">🏀 Shot chart équipe</button>';
  } else {
    h+='<button class="btn bp" onclick="generateStatsPDF()" style="'+btnStyle+'">📋 Générer le PDF</button>';
  }
  h+='</div>';

  if(!_esState.matchIds.length)h+='<div style="margin-top:12px;font-size:13px;color:var(--txt3);">Sélectionnez au moins un match pour continuer.</div>';
  else if(_esState.type!=='rentabilite'&&!_esState.playerIds.length)h+='<div style="margin-top:12px;font-size:13px;color:var(--txt3);">Sélectionnez au moins un joueur.</div>';

  return h;
}

  else if(_esState.type==='shotchart')generateShotChartPDF();

function generateRentabilitePDF(){
  if(typeof jspdf==='undefined'){toast('Chargement de jsPDF…','red');return;}
  var rentSeqs=[];
  _esState.matchIds.forEach(function(mid){
    DB.sequences.filter(function(s){return s.matchId===mid&&s.mode==='collectif';}).forEach(function(s){rentSeqs.push(s);});
  });
  if(!rentSeqs.length){toast('Aucune séquence collectif pour les matchs sélectionnés','red');return;}

  var doc=new jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W=doc.internal.pageSize.getWidth();
  var margin=14,y=margin;

  // Header
  doc.setFillColor(21,14,0);doc.rect(0,0,W,28,'F');
  doc.setTextColor(212,170,106);doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text('Rentabilité des systèmes',margin,17);
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(180,160,120);
  var matchLabels=_esState.matchIds.map(function(mid){var m=gM(mid);return m?'J'+m.round:'?';}).join(', ');
  doc.text('Matchs : '+matchLabels+'   ·   '+rentSeqs.length+' séquences',margin,23);
  y=36;

  // Build tree
  var tree={};
  rentSeqs.forEach(function(s){
    var fam=s.family||'?',sub=s.sub||'?',act=s.action||'?';
    if(!tree[fam])tree[fam]={};
    if(!tree[fam][sub])tree[fam][sub]={};
    if(!tree[fam][sub][act])tree[fam][sub][act]=[];
    tree[fam][sub][act].push(s);
  });
  function calcSt(seqList){var n=seqList.length,pts=0,hasPts=false,byResult={};seqList.forEach(function(s){if(s.resultPts!=null){pts+=s.resultPts;hasPts=true;}var res=s.result||'?';byResult[res]=(byResult[res]||0)+1;});var scored=seqList.filter(function(s){return s.resultPts!=null&&s.resultPts>0;}).length;return{n:n,pts:pts,ppp:hasPts&&n>0?pts/n:null,pct:n>0?Math.round(scored/n*100):0,hasPts:hasPts,byResult:byResult};}

  Object.keys(tree).forEach(function(fam){
    // Famille header
    doc.setFillColor(40,30,10);doc.rect(margin-2,y-4,W-2*margin+4,10,'F');
    doc.setTextColor(212,170,106);doc.setFontSize(13);doc.setFont('helvetica','bold');
    doc.text(fam,margin,y+3);
    var famSeqs=[];Object.values(tree[fam]).forEach(function(subs){Object.values(subs).forEach(function(acts){acts.forEach(function(s){famSeqs.push(s);});});});
    var fst=calcSt(famSeqs);
    if(fst.hasPts){doc.setFontSize(10);doc.text(fst.n+' poss.  ·  PPP: '+fst.ppp.toFixed(2)+'  ·  '+fst.pct+'% réussite',W-margin,y+3,{align:'right'});}
    y+=12;

    Object.keys(tree[fam]).forEach(function(sub){
      var subSeqs=[];Object.values(tree[fam][sub]).forEach(function(acts){acts.forEach(function(s){subSeqs.push(s);});});
      var sst=calcSt(subSeqs);
      // Sub-famille row
      doc.setDrawColor(212,170,106);doc.setLineWidth(0.5);doc.line(margin,y,W-margin,y);
      // Sub-famille background
      doc.setFillColor(245,240,225);doc.rect(margin-2,y,W-2*margin+4,8,'F');
      doc.setTextColor(80,55,10);doc.setFontSize(11);doc.setFont('helvetica','bold');
      doc.text('  '+sub,margin,y+5);
      if(sst.hasPts){doc.setFontSize(9);doc.setTextColor(80,55,10);doc.text(sst.n+' poss.  PPP: '+sst.ppp.toFixed(2)+'  '+sst.pct+'%',W-margin,y+5,{align:'right'});}
      y+=9;

      // ── En-tête colonnes ──
      doc.setFillColor(235,230,215);doc.rect(margin-2,y-1,W-2*margin+4,7,'F');
      doc.setFontSize(7.5);doc.setTextColor(100,85,55);doc.setFont('helvetica','bold');
      doc.text('Action',margin+4,y+3.5);
      doc.text('Poss.',margin+80,y+3.5,{align:'right'});
      doc.text('Pts',margin+105,y+3.5,{align:'right'});
      doc.text('PPP',margin+120,y+3.5,{align:'center'});
      doc.text('% Réussite',margin+150,y+3.5,{align:'right'});
      y+=8;

      var rowIdx=0;
      Object.keys(tree[fam][sub]).forEach(function(act){
        var ast=calcSt(tree[fam][sub][act]);
        var resKeys=Object.keys(ast.byResult);
        // Hauteur : 8 (nom action) + 7 * nb résultats + 4 padding
        var rowH=8+(resKeys.length*7)+4;
        if(y+rowH>270){doc.addPage();y=20;}

        // Fond alterné
        if(rowIdx%2===0){doc.setFillColor(250,248,244);}else{doc.setFillColor(255,255,255);}
        doc.rect(margin-2,y-1,W-2*margin+4,rowH+1,'F');
        rowIdx++;

        // ── Nom de l'action + métriques ──
        doc.setTextColor(20,15,5);doc.setFontSize(9);doc.setFont('helvetica','bold');
        doc.text(act,margin+4,y+4.5);
        doc.setFont('helvetica','normal');doc.setTextColor(40,30,10);doc.setFontSize(8);
        doc.text(String(ast.n)+' poss.',margin+80,y+4.5,{align:'right'});
        if(ast.hasPts){
          doc.text(ast.pts.toFixed(1)+' pts',margin+105,y+4.5,{align:'right'});
          var pppStr=ast.ppp.toFixed(2);
          // Badge PPP simulé pill : rect + 2 cercles aux extrémités
          var bx=margin+108, by=y+0.5, bw=24, bh=6, br=3;
          if(ast.ppp>=1.0){doc.setFillColor(60,180,100);}
          else if(ast.ppp>=0.51){doc.setFillColor(190,150,60);}
          else{doc.setFillColor(200,60,60);}
          doc.rect(bx+br,by,bw-2*br,bh,'F');
          doc.circle(bx+br,by+bh/2,bh/2,'F');
          doc.circle(bx+bw-br,by+bh/2,bh/2,'F');
          doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(8);
          doc.text(pppStr,bx+bw/2,y+4.5,{align:'center'});
          doc.setTextColor(40,30,10);doc.setFont('helvetica','normal');
          doc.text(ast.pct+'%',margin+150,y+4.5,{align:'right'});
        }
        y+=8;

        // ── Barres de progression par résultat ──
        var barX=margin+28;
        var barMaxW=105;
        var barH=3.5;

        resKeys.forEach(function(res){
          var cnt=ast.byResult[res];
          var pct2=ast.n>0?Math.round(cnt/ast.n*100):0;
          var filled=Math.round(barMaxW*pct2/100);
          var resLower=res.toLowerCase();
          var isGood=resLower.indexOf('pts')>=0||resLower.indexOf('marqué')>=0||resLower.indexOf('panier')>=0||resLower.indexOf('faute')>=0||resLower.indexOf('marque')>=0;

          // Label
          doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(70,60,40);
          var truncRes=res.length>15?res.substring(0,14)+'…':res;
          doc.text(truncRes,margin+4,y+barH);

          // Fond barre
          doc.setFillColor(215,210,200);
          doc.rect(barX,y,barMaxW,barH,'F');

          // Remplissage
          if(filled>0){
            if(isGood){doc.setFillColor(60,180,100);}else{doc.setFillColor(210,70,70);}
            doc.rect(barX,y,filled,barH,'F');
          }

          // %
          doc.setFontSize(7.5);doc.setFont('helvetica','bold');
          doc.setTextColor(isGood?30:160, isGood?130:40, isGood?60:40);
          doc.text(pct2+'%',barX+barMaxW+5,y+barH,{align:'left'});

          y+=7;
        });
        y+=4;
      });
      y+=3;
    });
    y+=5;
  });

  doc.save('rentabilite_systemes.pdf');
  toast('PDF Rentabilité généré !','acc');
}

function getMatchSubtitle(){

  _esState.matchIds.forEach(function(mid){var m=gM(mid);if(m){var t=gT(m.teamId);parts.push('J'+m.round+' '+(m.home?(t?t.name:'?')+' vs '+m.opp:m.opp+' vs '+(t?t.name:'?'))+' ('+m.date+')');}});

function aggregatePlayerStats(pid){
  var agg={pts2m:0,pts2r:0,pts3m:0,pts3r:0,lfm:0,lfr:0,rebo:0,rebd:0,pd:0,inter:0,contre:0,bp:0,fi:0,fc:0,pts:0,pm:0,eval:0,min:0,shots:[]};
  var allQTs=_esState.qts;
  var filterQT=(allQTs&&allQTs.length>0&&!(allQTs.length===4&&allQTs.indexOf('1')>=0&&allQTs.indexOf('2')>=0&&allQTs.indexOf('3')>=0&&allQTs.indexOf('4')>=0));
  _esState.matchIds.forEach(function(mid){
    var s=gPS(mid,pid);
    if(!filterQT){
      // All QTs — use stored totals directly
      Object.keys(agg).forEach(function(k){if(k!=='shots')agg[k]+=(s[k]||0);});
    } else {
      // Filter by QT via statLogs
      var log=getLog(mid)||[];
      var keys=['pts2m','pts2r','pts3m','pts3r','lfm','lfr','rebo','rebd','pd','inter','contre','bp','fi','fc'];
      log.forEach(function(ev){
        if(ev.pid===pid&&allQTs.indexOf(String(ev.qt||'1'))>=0){
          if(ev.type==='stat'&&keys.indexOf(ev.key)>=0)agg[ev.key]=(agg[ev.key]||0)+1;
        }
      });
      // pm and min can't be easily QT-filtered, use raw
      agg.pm+=(s.pm||0);
      agg.min+=(s.min||0);
    }
    (s.shots||[]).forEach(function(sh){if(allQTs.indexOf(String(sh.qt||'1'))>=0)agg.shots.push(sh);});
  });
  agg.pts=agg.pts2m*2+agg.pts3m*3+agg.lfm;
  var reb=(agg.rebo||0)+(agg.rebd||0);
  agg.eval=agg.pts+reb+(agg.pd||0)+(agg.inter||0)+(agg.contre||0)-(agg.pts2r||0)-(agg.pts3r||0)-(agg.lfr||0)-(agg.bp||0);
  return agg;
}

// INDIVIDUAL STATS PDF

function generateIndividualPDF(){
  var doc=new jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  var W=doc.internal.pageSize.getWidth();  // 297
  var H=doc.internal.pageSize.getHeight(); // 210
  var subtitle=getMatchSubtitle();
  var logo=getTeamLogo();
  var pct=function(m,t){return t>0?Math.round(m/t*100)+'%':'—';};

  var teamMap={};
  _esState.matchIds.forEach(function(mid){var m=gM(mid);if(m){var t=gT(m.teamId);if(t&&!teamMap[t.id])teamMap[t.id]=t;}});

  Object.values(teamMap).forEach(function(team,ti){
    // Ne générer la page que si au moins un joueur de cette équipe est sélectionné
    var players=team.players.filter(function(p){return _esState.playerIds.indexOf(p.id)>=0;})
      .sort(function(a,b){return (parseInt(a.num)||0)-(parseInt(b.num)||0);});
    if(!players.length)return;
    if(ti>0)doc.addPage();
    var y=getPdfHeader(doc,'FEUILLE DE STATISTIQUES',subtitle,logo,0);
    y+=3;

    // Team subheader
    doc.setFillColor(42,42,42);doc.rect(8,y,W-16,8,'F');
    doc.setFillColor(212,170,106);doc.rect(8,y,3,8,'F');
    doc.setTextColor(212,170,106);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text(team.name.toUpperCase(),14,y+5.5);
    doc.setTextColor(140,140,140);doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(team.champ+'  ·  QT : '+_esState.qts.join(', '),14+doc.getTextWidth(team.name.toUpperCase())+4,y+5.5);
    y+=10;

    // Columns — use full page width
    var sx=8;
    var nameW=30;
    var C=[
      {h:'N°',w:7},{h:'Joueur',w:nameW},{h:'Min',w:8},{h:'PTS',w:10},
      {h:'TM',w:8},{h:'TT',w:8},{h:'%T',w:8},
      {h:'2PM',w:8},{h:'2PT',w:8},{h:'%2P',w:8},
      {h:'3PM',w:8},{h:'3PT',w:8},{h:'%3P',w:8},
      {h:'LFM',w:7},{h:'LFT',w:7},{h:'%LF',w:7},
      {h:'RO',w:6},{h:'RD',w:6},{h:'Reb',w:7},
      {h:'PD',w:6},{h:'Int',w:6},{h:'Ctr',w:6},{h:'BP',w:6},
      {h:'F.P',w:6},{h:'F.C',w:6},
      {h:'Éval',w:8},{h:'+/-',w:8}
    ];
    var TW=C.reduce(function(s,x){return s+x.w;},0);
    // Scale columns to fill page
    var scale=(W-16)/TW;
    C=C.map(function(col){return{h:col.h,w:Math.round(col.w*scale)};});
    TW=C.reduce(function(s,x){return s+x.w;},0);

    // Header row
    doc.setFillColor(28,28,38);doc.rect(sx,y,TW,7,'F');
    var cx2=sx;
    C.forEach(function(col){
      doc.setTextColor(col.h==='PTS'?212:170,col.h==='PTS'?170:170,col.h==='PTS'?106:200);
      doc.setFontSize(6.5);doc.setFont('helvetica','bold');
      doc.text(col.h,cx2+col.w/2,y+4.6,{align:'center'});
      cx2+=col.w;
    });
    y+=7;

    var TOT={pts2m:0,pts2r:0,pts3m:0,pts3r:0,lfm:0,lfr:0,rebo:0,rebd:0,pd:0,inter:0,contre:0,bp:0,fi:0,fc:0,pts:0,pm:0,eval:0};

    function drawRow(vals,pm,textCol,rowH){
      var cx3=sx;
      vals.forEach(function(val,i){
        var col=C[i];if(!col)return;
        var isName=i===1,isPts=i===3,isEval=i===25,isPm_=i===26,isMin=i===2;
        doc.setFontSize(isName?6.5:6.5);
        doc.setFont('helvetica',(isName||isPts)?'bold':'normal');
        if(textCol){doc.setTextColor(textCol[0],textCol[1],textCol[2]);}
        else if(isPts)doc.setTextColor(180,100,0);
        else if(isEval)doc.setTextColor(50,50,180);
        else if(isPm_&&pm>0)doc.setTextColor(30,140,70);
        else if(isPm_&&pm<0)doc.setTextColor(190,50,50);
        else doc.setTextColor(20,20,20);
        var txt=String(val===null||val===undefined?'':val);
        if(isName)doc.text(txt,cx3+2,y+rowH/2+2);
        else doc.text(txt,cx3+col.w/2,y+rowH/2+2,{align:'center'});
        cx3+=col.w;
      });
    }

    var ROW_H=6;
    players.forEach(function(p,pi){
      var s=aggregatePlayerStats(p.id);
      Object.keys(TOT).forEach(function(k){if(k in TOT)TOT[k]+=(s[k]||0);});
      var t2=s.pts2m+s.pts2r,t3=s.pts3m+s.pts3r,tLF=s.lfm+s.lfr;
      var pm=s.pm||0;
      var minStr=(s.min&&s.min>0)?(s.min+"'"):'—';
      var totMade=s.pts2m+s.pts3m,totTaken=t2+t3;
      var vals=[p.num,p.first+' '+p.last,minStr,s.pts||0,
        totMade,totTaken,pct(totMade,totTaken),
        s.pts2m,t2,pct(s.pts2m,t2),s.pts3m,t3,pct(s.pts3m,t3),
        s.lfm,tLF,pct(s.lfm,tLF),
        s.rebo||0,s.rebd||0,(s.rebo||0)+(s.rebd||0),
        s.pd||0,s.inter||0,s.contre||0,s.bp||0,s.fi||0,s.fc||0,
        s.eval||0,(pm>=0?'+':'')+pm];
      // Row background
      var even=pi%2===0;
      doc.setFillColor(even?248:255,even?249:255,even?252:255);
      doc.rect(sx,y,TW,ROW_H,'F');
      // PTS highlight col
      var ptsCx=sx+C[0].w+C[1].w+C[2].w;
      doc.setFillColor(255,240,210);doc.rect(ptsCx,y,C[3].w,ROW_H,'F');
      doc.setDrawColor(220,220,228);doc.setLineWidth(0.1);doc.line(sx,y+ROW_H,sx+TW,y+ROW_H);
      drawRow(vals,pm,null,ROW_H);
      y+=ROW_H;
      if(y>H-25){doc.addPage();y=getPdfHeader(doc,'STATS (suite)',subtitle,logo,0);y+=4;}
    });

    // TOTAUX row
    TOT.pts=TOT.pts2m*2+TOT.pts3m*3+TOT.lfm;
    TOT.eval=TOT.pts+(TOT.rebo+TOT.rebd)+TOT.pd+TOT.inter+TOT.contre-TOT.pts2r-TOT.pts3r-TOT.lfr-TOT.bp;
    var tT2=TOT.pts2m+TOT.pts2r,tT3=TOT.pts3m+TOT.pts3r,tTLF=TOT.lfm+TOT.lfr;
    var totTM=TOT.pts2m+TOT.pts3m,totTT=tT2+tT3;
    var pm0=TOT.pm||0;
    var totVals=['','TOTAUX ÉQUIPE','',TOT.pts,totTM,totTT,pct(totTM,totTT),
