// Half-court PDF — copie exacte du SVG fourni (viewBox 0 0 1500 1400)
// 3pt arc: M 90 397.167 A 675 675 0 0 0 1410 397.167
// Centre (750, 255.66) — au-dessus corde, sens décroissant de 167.9° à 12.1°
function drawCourtPDF(doc,ox,oy,W,H){
  function px(x){return ox+x/1500*W;}
  function py(y){return oy+y/1400*H;}
  function pr(r){return r/1500*W;}

  // Fond bleu terrain
  doc.setFillColor(13,30,53);doc.rect(ox,oy,W,H,'F'); // dark navy premium
  doc.setDrawColor(212,170,106);doc.setLineWidth(0.3); // golden lines

  // Raquette gris
  doc.setFillColor(20,45,80);doc.rect(px(505),oy,px(995)-px(505),py(580)-oy,'F'); // paint premium blue

  // Contour terrain
  doc.rect(px(5),py(5),px(1495)-px(5),py(1395)-py(5),'S');

  // Contour raquette
  doc.rect(px(505),oy,px(995)-px(505),py(580)-oy,'S');

  // Ligne LF: y=577.5 de x=570 à 930
  doc.line(px(570),py(577.5),px(930),py(577.5));

  // Demi-cercle LF haut (dans raquette): moitié haute du cercle cx=750,cy=577.5,r=180
  _arcPDF(doc,px(750),py(577.5),pr(180),Math.PI,2*Math.PI,0.3,false);

  // Demi-cercle LF bas (hors raquette): M 570 580 A 180 180 0 0 0 930 580
  _arcPDF(doc,px(750),py(580),pr(180),0,Math.PI,0.3,false);

  // Planche: x=680-820, y=90
  doc.setLineWidth(0.5);
  doc.line(px(680),py(90),px(820),py(90));
  doc.line(px(750),py(90),px(750),py(130));
  doc.setLineWidth(0.3);

  // Panier: cx=750, cy=157.5, r=22.5
  doc.circle(px(750),py(157.5),pr(22.5),'S');

  // Arc non-charge: M 620 157.5 A 130 130 0 0 0 880 157.5
  // sweep=0, large=0 → demi-cercle bas depuis centre (750,157.5)
  _arcPDF(doc,px(750),py(157.5),pr(130),0,Math.PI,0.3,false);

  // Corner 3pts
  doc.line(px(90),oy,px(90),py(397.167));
  doc.line(px(1410),oy,px(1410),py(397.167));

  // Arc 3pts: M 90 397.167 A 675 675 0 0 0 1410 397.167
  // Centre: (750, 255.66), angles: 167.9° → 12.1° sens décroissant (CCW court)
  var cx3=px(750),cy3=py(255.66),r3=pr(675);
  var a3s=Math.atan2(py(397.167)-cy3,px(90)-cx3);    // +167.9°
  var a3e=Math.atan2(py(397.167)-cy3,px(1410)-cx3);  // +12.1°
  // a3s > a3e → interpolation décroissante passe par 90° (bas) = U shape
  var steps3=80;var prev3=null;
  for(var i=0;i<=steps3;i++){
    var a=a3s+(a3e-a3s)*i/steps3;
    var xp=cx3+r3*Math.cos(a),yp=cy3+r3*Math.sin(a);
    if(prev3)doc.line(prev3.x,prev3.y,xp,yp);
    prev3={x:xp,y:yp};
  }

  // Demi-cercle centre terrain (bas)
  _arcPDF(doc,px(750),oy+H,pr(150),Math.PI,2*Math.PI,0.3,false);
}

function _arcPDF(doc,cx,cy,r,startA,endA,lw,dashed){
  doc.setLineWidth(lw||0.3);
  var steps=36;var prev=null;var skip=false;
  for(var i=0;i<=steps;i++){
    var a=startA+(endA-startA)*i/steps;
    var x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
    if(prev){if(!dashed||i%2===0)doc.line(prev.x,prev.y,x,y);}
    prev={x:x,y:y};
  }
}

function _arcBetweenPDF(doc,cx,cy,r,x1,y1,x2,y2,lw){
  // Draw arc from (x1,y1) to (x2,y2) with center (cx,cy) radius r, going downward
  var a1=Math.atan2(y1-cy,x1-cx);
  var a2=Math.atan2(y2-cy,x2-cx);
  // Ensure we go the short way (downward arc)
  if(a2<a1)a2+=2*Math.PI;
  doc.setLineWidth(lw||0.3);
  var steps=48;var prev=null;
  for(var i=0;i<=steps;i++){
    var a=a1+(a2-a1)*i/steps;
    var x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
    if(prev)doc.line(prev.x,prev.y,x,y);
    prev={x:x,y:y};
  }
}



function _arc(doc,cx,cy,r,startA,endA,lw,dashed){
  doc.setLineWidth(lw||0.3);
  var steps=36;var prev=null;
  for(var i=0;i<=steps;i++){
    var t=i/steps;
    var a=startA+(endA-startA)*t;
    // Standard: angle 0 = right, PI = left, arc goes counter-clockwise
    var x=cx+r*Math.cos(a);
    var y=cy+r*Math.sin(a);
    if(prev){if(!dashed||i%2===0)doc.line(prev.x,prev.y,x,y);}
    prev={x:x,y:y};
  }
}

function _arcBetween(doc,basketX,basketY,r,x1,x2,ox,oy,W,H,lw){
  // Draw arc from point (x1, y1_on_arc) to (x2, y2_on_arc)
  // where the arc center is basketX,basketY and radius r
  // The arc that goes downward (positive y direction)
  var a1=Math.acos(Math.max(-1,Math.min(1,(x1-basketX)/r)));
  var a2=Math.acos(Math.max(-1,Math.min(1,(x2-basketX)/r)));
  // a1 from left side: angle is positive (y goes down)
  // We want the arc that dips downward: sin(a)>0 part
  doc.setLineWidth(lw||0.3);
  var steps=48;var prev=null;
  for(var i=0;i<=steps;i++){
    var a=a1+(a2-a1)*(i/steps);
    var x=basketX+r*Math.cos(a);
    var y=basketY+r*Math.sin(a); // sin positive = downward
    // Clip to court
    if(y>=oy&&y<=oy+H){
      if(prev)doc.line(prev.x,prev.y,x,y);
    }
    prev={x:x,y:y};
  }
}

// ═══════════════════════════════
// COLLECTIVE STATS PDF
// ═══════════════════════════════
function generateCollectivePDF(){
  var doc=new jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  var W=doc.internal.pageSize.getWidth();
  var H=doc.internal.pageSize.getHeight();
  var subtitle=getMatchSubtitle();
  var logo=getTeamLogo();
  var y=getPdfHeader(doc,'RENTABILITÉS COLLECTIVES PAR ACTION',subtitle,logo,0);
  y+=4;

  var seqs=DB.sequences.filter(function(s){
    return _esState.matchIds.indexOf(s.matchId)>=0&&s.mode==='collectif';
  });

  if(!seqs.length){
    doc.setTextColor(150,150,150);doc.setFontSize(12);
    doc.text('Aucune séquence collective codée pour ces matchs.',W/2,H/2,{align:'center'});
    _pdfFooter(doc);
    doc.save('BasketTaggPro_Collectif_'+new Date().toISOString().slice(0,10)+'.pdf');
    toast('PDF généré (aucune donnée)','acc');return;
  }

  // Group by Family → Action (skip sub-family)
  var byFamily={};
  var byAction={};
  seqs.forEach(function(s){
    var fam=s.family||'Autre';
    var act=s.action||'Inconnu';
    if(!byFamily[fam])byFamily[fam]=[];
    if(!byFamily[fam].find(function(x){return x===act;}))byFamily[fam].push(act);
    var key=fam+'|||'+act;
    if(!byAction[key])byAction[key]={possessions:0,pts:0,family:fam,action:act,results:{}};
    var g=byAction[key];g.possessions++;
    var pts=0;var rl=(s.result||'').toLowerCase();
    if(rl.indexOf('4pt')>=0)pts=4;
    else if(rl.indexOf('3pt')>=0||rl.indexOf('3 pt')>=0)pts=3;
    else if(rl.indexOf('2pt')>=0||rl.indexOf('2 pt')>=0)pts=2;
    else if(rl.indexOf('lf')>=0)pts=1;
    if(s.pts!=null&&!isNaN(s.pts))pts=s.pts;
    g.pts+=pts;
    g.results[s.result]=(g.results[s.result]||0)+1;
  })
  // Column widths — results col will hold mini pie chart
  var C2=[
    {h:'Action',w:52},
    {h:'Possessions',w:24},
    {h:'Points',w:20},
    {h:'Pts / Poss.',w:24},
    {h:'Résultats',w:W-20-120}
  ];
  var TW2=C2.reduce(function(s,x){return s+x.w;},0);
  var sx2=10;

  // Summary box
  doc.setFillColor(38,38,50);doc.rect(sx2,y,TW2,10,'F');
  doc.setFillColor(212,170,106);doc.rect(sx2,y,3,10,'F');
  doc.setTextColor(212,170,106);doc.setFontSize(9);doc.setFont('helvetica','bold');
  var totalActions=Object.keys(byAction).length;
  doc.text(_esState.matchIds.length+' match'+(_esState.matchIds.length>1?'s':'')+' · '+seqs.length+' séquences · '+totalActions+' actions',16,y+6.5);
  y+=13;

  var grandPoss=0,grandPts=0;

  // Iterate by family then actions within
  Object.keys(byFamily).forEach(function(fam){
    // Compute ROW_H for this family based on max results
    var maxRes=0;
    byFamily[fam].forEach(function(act2){var key2=fam+'|||'+act2;var g2=byAction[key2];if(g2)maxRes=Math.max(maxRes,Object.keys(g2.results).length);});
    var ROW_H=Math.max(14,Math.min(maxRes,4)*4+10);
    // Family header
    doc.setFillColor(42,42,55);doc.rect(sx2,y,TW2,9,'F');
    doc.setFillColor(212,170,106);doc.rect(sx2,y,4,9,'F');
    doc.setTextColor(212,170,106);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text(fam.toUpperCase(),sx2+8,y+6.2);
    y+=9;

    // Column header for this family
    doc.setFillColor(28,28,38);doc.rect(sx2,y,TW2,6,'F');
    var cx2=sx2;
    C2.forEach(function(col){
      doc.setTextColor(170,170,200);doc.setFontSize(7);doc.setFont('helvetica','bold');
      doc.text(col.h,cx2+col.w/2,y+4.2,{align:'center'});
      cx2+=col.w;
    });
    y+=6;

    var famActions=byFamily[fam];
    famActions.forEach(function(act,ai){
      var key=fam+'|||'+act;
      var g=byAction[key];if(!g)return;
      grandPoss+=g.possessions;grandPts+=g.pts;
      var ppp=g.possessions>0?(g.pts/g.possessions):0;

      // Row background
      var bg=ai%2===0?[248,248,252]:[255,255,255];
      doc.setFillColor(bg[0],bg[1],bg[2]);doc.rect(sx2,y,TW2,ROW_H,'F');
      // Per-action color bar
      var ACTION_PALETTE=[[91,141,239],[61,191,122],[212,170,106],[180,120,200],[255,180,50],[224,82,82],[50,180,180],[255,140,0]];
      var acol=ACTION_PALETTE[ai%ACTION_PALETTE.length];
      doc.setFillColor(acol[0],acol[1],acol[2]);
      doc.rect(sx2,y,3,ROW_H,'F');
      doc.setDrawColor(215,215,222);doc.setLineWidth(0.1);
      doc.line(sx2,y+ROW_H,sx2+TW2,y+ROW_H);

      var midY=y+ROW_H/2+1;
      // Action name
      doc.setTextColor(20,20,20);doc.setFontSize(8);doc.setFont('helvetica','bold');
      doc.text(act,sx2+5,midY);
      // Possessions
      doc.setFont('helvetica','normal');doc.setFontSize(8);
      doc.text(String(g.possessions),sx2+C2[0].w+C2[1].w/2,midY,{align:'center'});
      // Points
      doc.text(String(g.pts),sx2+C2[0].w+C2[1].w+C2[2].w/2,midY,{align:'center'});
      // Pts/Poss colored
      doc.setFont('helvetica','bold');
      doc.setTextColor(ppp>=1?30:190,ppp>=1?155:50,ppp>=1?75:50);
      doc.text(ppp.toFixed(2),sx2+C2[0].w+C2[1].w+C2[2].w+C2[3].w/2,midY,{align:'center'});

      // Pie chart - centered in Résultats column
      var resColX=sx2+C2[0].w+C2[1].w+C2[2].w+C2[3].w;
      var resW=C2[4].w;
      var resX=resColX+resW/2-18; // shift right to center
      var resEntries=Object.keys(g.results).sort(function(a,b){return g.results[b]-g.results[a];});
      var total2=g.possessions;
      // Pie chart — centered vertically in the row
      var pieR=Math.min(ROW_H/2-2, 7);
      var pieCx=resX+pieR+2;
      var pieCy=y+ROW_H/2;
      // Color palette for slices
      var COLORS=[[61,191,122],[212,170,106],[91,141,239],[224,82,82],[180,120,200],[255,180,50]];
      var startAngle=-Math.PI/2;
      resEntries.forEach(function(res,ri){
        var frac=g.results[res]/total2;
        var endAngle=startAngle+frac*2*Math.PI;
        var col3=COLORS[ri%COLORS.length];
        // Draw slice
        doc.setFillColor(col3[0],col3[1],col3[2]);
        // Build slice path using lines
        var steps=Math.max(3,Math.round(frac*24));
        var pts2=[[pieCx,pieCy]];
        for(var si=0;si<=steps;si++){
          var a=startAngle+(endAngle-startAngle)*si/steps;
          pts2.push([pieCx+pieR*Math.cos(a),pieCy+pieR*Math.sin(a)]);
        }
          // Draw filled pie slice using raw PDF path commands (moveto/lineto/fill)
        doc.setFillColor(col3[0],col3[1],col3[2]);
        var pathSteps=Math.max(12,Math.round(Math.abs(endAngle-startAngle)*pieR*3));
        var pathStr='';
        // Build path: move to center, line to arc start, arc segments, close
        var ax0=pieCx+pieR*Math.cos(startAngle),ay0=pieCy+pieR*Math.sin(startAngle);
        // Use jsPDF internal path for proper fill
        if(doc.internal&&doc.internal.write){
          var k=doc.internal.scaleFactor;
          var H=doc.internal.pageSize.getHeight();
          // Convert to jsPDF internal coords (Y flipped)
          function toJsPDF(x,y){return {x:x*k, y:(H-y)*k};}
          var p0=toJsPDF(pieCx,pieCy);
          var p1=toJsPDF(ax0,ay0);
          var pathParts=[p0.x+' '+p0.y+' m',p1.x+' '+p1.y+' l'];
          for(var pi2=1;pi2<=pathSteps;pi2++){
            var ang=startAngle+(endAngle-startAngle)*pi2/pathSteps;
            var px2=pieCx+pieR*Math.cos(ang),py2=pieCy+pieR*Math.sin(ang);
            var pp=toJsPDF(px2,py2);
            pathParts.push(pp.x+' '+pp.y+' l');
          }
          pathParts.push('f'); // fill
          doc.internal.write(pathParts.join(' '));
        }
        startAngle=endAngle;
      });
      // White center hole (donut)
      doc.setFillColor(bg[0],bg[1],bg[2]);doc.circle(pieCx,pieCy,pieR*0.45,'F');
      // Legend next to pie — vertically centered
      var legX=pieCx+pieR+4;
      var numRes=Math.min(resEntries.length,4);
      var legLineH=Math.min(4.5,(ROW_H-2)/numRes);
      var legTotalH=numRes*legLineH;
      var legY=pieCy-legTotalH/2+1;
      resEntries.slice(0,4).forEach(function(res,ri){
        var col3=COLORS[ri%COLORS.length];
        var pct2=Math.round(g.results[res]/total2*100);
        doc.setFillColor(col3[0],col3[1],col3[2]);
        doc.circle(legX+1.5,legY+1.2,1.3,'F');
        doc.setTextColor(30,30,30);doc.setFontSize(6);doc.setFont('helvetica','normal');
        var label2=res.length>16?res.substring(0,14)+'…':res;
        doc.text(label2+' '+pct2+'%',legX+4.5,legY+2.2);
        legY+=legLineH;
      });

      y+=ROW_H;
      if(y>H-22){doc.addPage();y=getPdfHeader(doc,'RENTABILITÉS (suite)',subtitle,logo,0);y+=8;}
    });

    y+=3; // spacing between families
  });

  // Grand total
  y+=2;
  var gPPP=grandPoss>0?(grandPts/grandPoss):0;
  doc.setFillColor(26,26,30);doc.rect(sx2,y,TW2,9,'F');
  _pdfFooter(doc);
  doc.save('BasketTaggPro_Collectif_'+new Date().toISOString().slice(0,10)+'.pdf');
  toast('✓ PDF rentabilités téléchargé','acc');
}

function _pdfFooter(doc){
  var W=doc.internal.pageSize.getWidth();
  var H=doc.internal.pageSize.getHeight();
  var total=doc.internal.getNumberOfPages();
  for(var i=1;i<=total;i++){

  }
}

function logEventEdit(matchId,idx,field,value){
  var log=getLog(matchId);
  if(idx>=log.length)return;
  var ev=log[idx];
  var m=gM(matchId);if(!m)return;
  var team=gT(m.teamId);if(!team)return;

  if(ev.type==='sub'){
    // Just update log entry — sub already applied
    if(field==='outId')ev.outId=parseInt(value);
    else if(field==='inId')ev.inId=parseInt(value);
    else if(field==='qt')ev.qt=parseInt(value)||null;
    saveDB();renderStatsModalContent();return;
  }

  // For stat/shot: reverse old event, apply new event
  applyLogEvent(matchId,ev,team,m,-1); // reverse
  // Apply change
  if(field==='who'){
    // value is 'adverse', 'collectif', or 'p<id>'
    if(value==='adverse'){ev.pid=null;ev.target='adverse';}
    else if(value==='collectif'){ev.pid=null;ev.target='collectif';}
    else{ev.pid=parseInt(value.replace('p',''));ev.target='player';}
  } else if(field==='pid')ev.pid=parseInt(value)||null;
  else if(field==='key'){ev.key=value;if(ev.type==='shot'){var SHOT_MADE={pts2m:true,pts3m:true,lfm:true,pts2r:false,pts3r:false,lfr:false};ev.made=SHOT_MADE[value]!==undefined?SHOT_MADE[value]:ev.made;}}
  else if(field==='qt'){ev.qt=parseInt(value)||null;}
  applyLogEvent(matchId,ev,team,m,+1); // apply new

  // Sync shot entry if it's a shot
  if(ev.type==='shot'&&ev.pid!=null){
    var s=gPS(matchId,ev.pid);
    if(s.shots&&ev.shotIdx!=null&&ev.shotIdx<s.shots.length){
      s.shots[ev.shotIdx].key=ev.key;s.shots[ev.shotIdx].qt=ev.qt;
      var SHOT_MADE={pts2m:true,pts3m:true,lfm:true,pts2r:false,pts3r:false,lfr:false};
      s.shots[ev.shotIdx].made=SHOT_MADE[ev.key]!==undefined?SHOT_MADE[ev.key]:ev.made;
    }
  }

  saveDB();renderStatsModalContent();
  // Refresh score display if coding view open
  if(document.getElementById('codingView').classList.contains('active')&&CS.matchId===matchId){
    CS.scoreA=m.scoreA;CS.scoreB=m.scoreB;
    renderCourtCol();renderActionPanel();
  }
}

// Apply (delta=+1) or reverse (delta=-1) a single log event onto the stats/score
function applyLogEvent(matchId,ev,team,m,delta){
  if(ev.type==='sub')return;
  var SCORE_VAL={pts2m:2,pts3m:3,lfm:1,pts2r:0,pts3r:0,lfr:0};
  var isTeamAction=(ev.target!=='adverse');
  var isHome=m.home;
  var pts=SCORE_VAL[ev.key]||0;
  // Update stat counter for the player
  if(ev.pid!=null){
    var s=gPS(matchId,ev.pid);
    s[ev.key]=Math.max(0,(s[ev.key]||0)+delta);
    recalc(matchId,ev.pid);
  }
  // Update +/- for on-court players on scoring events
  if(pts>0){
    var savedState=localStorage.getItem('btp_cs_'+matchId+'_stats');
    var onCourt=savedState?JSON.parse(savedState).onCourt||[]:[];
    onCourt.forEach(function(pid){
      var sp=gPS(matchId,pid);
      sp.pm=(sp.pm||0)+(isTeamAction?delta*pts:delta*-pts);
      recalc(matchId,pid);
    });
    // Update match score
    if(isTeamAction){
      if(isHome)m.scoreA=Math.max(0,(m.scoreA||0)+delta*pts);
      else m.scoreB=Math.max(0,(m.scoreB||0)+delta*pts);
    } else {
      if(isHome)m.scoreB=Math.max(0,(m.scoreB||0)+delta*pts);
      else m.scoreA=Math.max(0,(m.scoreA||0)+delta*pts);
    }
  }
}


function logEventDelete(matchId,idx){
  var log=getLog(matchId);
  if(idx>=log.length)return;
  var ev=log[idx];
  var m=gM(matchId);if(!m)return;
  var team=gT(m.teamId);if(!team)return;

  if(ev.type==='sub'){
    log.splice(idx,1);
  } else {
    // Reverse the event fully (stats + score + pm)
    applyLogEvent(matchId,ev,team,m,-1);
    if(ev.type==='shot'&&ev.pid!=null){
      var s=gPS(matchId,ev.pid);
      if(s.shots&&ev.shotIdx!=null)s.shots.splice(ev.shotIdx,1);
      // Re-index shotIdx in remaining log entries for same player
      log.forEach(function(e){
        if(e.type==='shot'&&e.pid===ev.pid&&e.shotIdx>ev.shotIdx)e.shotIdx--;
      });
    }
    log.splice(idx,1);
  }
  saveDB();
  renderStatsModalContent();
  if(document.getElementById('codingView').classList.contains('active')&&CS.matchId===matchId){
    CS.scoreA=m.scoreA;CS.scoreB=m.scoreB;
    renderCourtCol();renderActionPanel();
  }
}

function attachPageHandlers(){
  // Keyboard shortcuts — collectif & individuel coding modes
  document.onkeydown=function(e){
    if(document.activeElement&&['INPUT','TEXTAREA','SELECT'].indexOf(document.activeElement.tagName)>=0)return;
    if(!CS.matchId||(CS.mode!=='collectif'&&CS.mode!=='individuel'))return;
    var board=gB(CS.boardId);if(!board)return;

    // Individuel: shortcuts only active after a player is selected
    if(CS.mode==='individuel'){
      var selPid=CS.indivMode==='highlight'?CS.hlPlayer:CS.selPlayer;
      if(!selPid)return; // no player selected yet — no shortcuts
    }

    // If waiting for a result → match shortcut on Result nodes linked to pending action
    if(CS.pendingAct&&!CS.pendingRes){
      var results=bgR(board,CS.pendingAct.id);
      var resNode=results.find(function(n){return n.shortcut&&n.shortcut===e.key;});
      if(resNode){
        e.preventDefault();
        clickResult(resNode.id);
        return;
      }
    }

    // If no action pending → match shortcut on Action nodes
    if(!CS.pendingAct){
      var actNode=board.nodes.find(function(n){return n.shortcut&&n.shortcut===e.key&&n.type==='Action';});
      if(actNode){
        e.preventDefault();
        CS._t=currentTime();pauseVideo();CS.pendingAct=actNode;CS.preroll=false;CS.pendingRes=null;
        renderActionPanel();
        return;
